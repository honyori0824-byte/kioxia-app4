<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;font-family:monospace;color:#0f172a;padding-bottom:80px;}
button,input,textarea{font-family:monospace;cursor:pointer;}

.hd{background:#1e293b;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99;}
.badge{background:#d97706;color:#fff;font-weight:900;font-size:12px;padding:3px 8px;border-radius:4px;margin-right:8px;}
.hd-price{font-size:20px;font-weight:900;text-align:right;}

.nav{display:flex;background:#1e293b;overflow-x:auto;padding:0 16px;border-bottom:1px solid #334155;}
.nb{background:none;border:none;color:#94a3b8;font-size:12px;padding:12px 14px;border-bottom:2px solid transparent;white-space:nowrap;}
.nb.on{color:#fbbf24;border-bottom-color:#fbbf24;font-weight:700;}

.pg{padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;}
.stitle{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

.jbanner{border-radius:14px;border:2px solid;padding:20px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;}
.jicon{font-size:48px;}
.jlabel{font-size:28px;font-weight:900;}
.jsub{font-size:12px;color:#64748b;}
.score-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.sc{text-align:center;}
.sc-l{font-size:10px;color:#64748b;margin-bottom:2px;}
.sc-v{font-size:20px;font-weight:900;}

.sbar-wrap{width:100%;max-width:300px;}
.sbar-lbl{display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-bottom:3px;}
.sbar{height:8px;background:#e2e8f0;border-radius:4px;position:relative;}
.sbar-fill{position:absolute;height:100%;border-radius:4px;transition:all .3s;}
.sbar-mid{position:absolute;left:50%;top:-2px;width:2px;height:12px;background:#94a3b8;transform:translateX(-50%);}

.isec{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;}
.isec-hd{padding:10px 14px;border-bottom:1px solid #e2e8f0;}
.irow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #e2e8f0;}
.irow:last-child{border-bottom:none;}
.ilabel{font-size:13px;font-weight:700;}
.ihint{font-size:10px;color:#2563eb;margin-top:2px;display:none;}
.irow.focused .ihint{display:block;}
.irow.focused{background:#eff6ff;}
.ninput{width:110px;border:1.5px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:16px;font-weight:800;text-align:right;outline:none;background:#f8fafc;}
.ninput:focus{background:#fff;}

.ci{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:8px;background:#f8fafc;border:1.5px solid #e2e8f0;margin-bottom:7px;cursor:pointer;transition:all .15s;}
.ci.on{background:#f0fdf4;border-color:#059669;box-shadow:0 0 0 3px #05966918;}
.cbox{width:20px;height:20px;border-radius:5px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;border:2px solid #e2e8f0;background:#fff;transition:all .15s;}
.ci.on .cbox{background:#059669;border-color:#059669;}
.ctitle{font-size:12px;font-weight:700;}
.ci.on .ctitle{color:#059669;}
.cdesc{font-size:10px;color:#64748b;margin-top:2px;}
.cscore{font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;background:#e2e8f0;color:#64748b;}
.ci.on .cscore{background:#059669;color:#fff;}

.rbox{background:#fff;border-radius:10px;padding:12px 14px;}
.ritem{font-size:11px;line-height:1.6;margin-bottom:5px;padding-left:8px;border-left:2px solid;}

.paste-panel{background:#fff;border:2px solid #2563eb;border-radius:12px;overflow:hidden;}
.paste-hd{padding:12px 14px;background:#eff6ff;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.paste-body{padding:14px;display:flex;flex-direction:column;gap:10px;}
.pbox{background:#1e293b;border-radius:7px;padding:9px 11px;font-size:11px;color:#94a3b8;font-family:monospace;line-height:1.7;white-space:pre-wrap;}
.cbtn{width:100%;padding:10px;border-radius:7px;background:#2563eb;color:#fff;font-weight:800;font-size:13px;border:none;}
.ptarea{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px;font-size:12px;color:#0f172a;font-family:monospace;outline:none;resize:vertical;line-height:1.7;min-height:100px;}
.ptarea.ok{background:#f0fdf4;border-color:#059669;}
.pvgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:6px;}
.pvi{background:#fff;border-radius:5px;padding:5px 7px;text-align:center;border:1px solid #2563eb22;}
.pvl{font-size:9px;color:#64748b;}
.pvv{font-size:12px;font-weight:800;color:#2563eb;}
.ai-box{background:#fffbeb;border:1px solid #d9770644;border-radius:7px;padding:10px;font-size:12px;line-height:1.8;white-space:pre-wrap;}
.abtn{width:100%;padding:12px;border-radius:8px;background:#059669;color:#fff;font-weight:900;font-size:14px;border:none;}
.appd{padding:10px;background:#f0fdf4;border:1px solid #059669;border-radius:7px;font-size:12px;color:#059669;font-weight:700;text-align:center;}

.ai-panel{background:#fff;border:2px solid #d97706;border-radius:12px;overflow:hidden;}
.ai-phd{padding:10px 14px;background:linear-gradient(135deg,#fffbeb,#f8fafc);border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;}
.ai-text{font-size:13px;line-height:2;white-space:pre-wrap;padding:14px;}
.disc{margin:0 14px 14px;padding:7px 10px;border-radius:5px;background:#fffbeb;font-size:10px;color:#64748b;}

.jentry{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:10px;}
.je-hd{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;border-bottom:1px solid #e2e8f0;}
.je-scores{display:grid;grid-template-columns:repeat(5,1fr);padding:7px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;}
.jes{text-align:center;}
.jesl{font-size:9px;color:#64748b;}
.jesv{font-size:11px;font-weight:700;}
.je-body{padding:10px 12px;}
.tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;}
.oc-area{display:flex;align-items:center;gap:7px;margin-top:7px;}
.oc-text{font-size:11px;color:#059669;padding:5px 8px;border-radius:5px;background:#f0fdf4;border:1px solid #05996933;flex:1;}
.oc-empty{font-size:11px;color:#94a3b8;font-style:italic;}
.aopt{padding:8px 5px;border-radius:7px;font-size:11px;border:2px solid #e2e8f0;background:#f8fafc;color:#64748b;transition:all .15s;}
.aopt.on{font-weight:800;}
.empty-st{background:#fff;border:2px dashed #e2e8f0;border-radius:12px;padding:36px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;color:#64748b;text-align:center;}
</style>

</head>
<body>
<div id="root"></div>
<script>
var ACQ=22721,SH=300;
var FIVE=[
  {id:"vixPeak",label:"① VIXピークアウト確認",desc:"VIXが40〜50台から低下に転じている",score:25},
  {id:"pcRatio",label:"② P/C比率が低水準",desc:"70%台以下＝極度の悲観→反発サイン",score:20},
  {id:"volumeStable",label:"③ 出来高：急増後に安定",desc:"記録的出来高で急落→その後縮小して安定",score:20},
  {id:"lowerWick",label:"④ 長い下ヒゲ出現",desc:"ローソク足の下ヒゲが実体の2倍以上",score:25},
  {id:"maDeviation",label:"⑤ 25日MA乖離率プラス転換",desc:"マイナス乖離がプラスに転じる＝自律反発",score:20}
];
var ACTS=[
  {id:"buy_new",label:"🟢 新規買い",c:"#059669"},
  {id:"buy_add",label:"➕ 買い増し",c:"#059669"},
  {id:"sell_part",label:"📤 部分利確",c:"#0891b2"},
  {id:"sell_all",label:"🔴 全売り",c:"#dc2626"},
  {id:"hold",label:"⏸ ホールド",c:"#b45309"},
  {id:"watch",label:"👀 様子見",c:"#64748b"}
];
var PROMPT="このiSPEEDのスクリーンショットを分析して、以下の専用フォーマットで返してください。\n\nKIOXIA_DATA:\nprice=（現在値）\nrsiS=（RSI短期）\nrsiL=（RSI長期）\nmacd=（MACD値）\nmacdSig=（MACDシグナル）\nvix=（VIX指数）\n\nKIOXIA_5CHECK:\nvixPeak=（true/false）\npcRatio=（true/false）\nvolumeStable=（true/false）\nlowerWick=（true/false）\nmaDeviation=（true/false）\n\nKIOXIA_AI:\n（現在の相場状況・注目ポイント・今日のアクション提案を200〜300文字で）";

var S={
tab:“judge”,
v:{price:“30500”,rsiS:“100”,rsiL:“75.37”,macd:“114.77”,macdSig:“72.70”,vix:“19.23”},
c5:{vixPeak:false,pcRatio:false,volumeStable:true,lowerWick:false,maDeviation:true},
ai:””,pt:””,parsed:null,applied:false,popen:true,copied:false,
journal:[],jform:false,jact:“hold”,jmemo:””,
editId:null,oc:””
};

function calc(){
var p=parseFloat(S.v.price)||0,rs=parseFloat(S.v.rsiS)||50,rl=parseFloat(S.v.rsiL)||50;
var m=parseFloat(S.v.macd)||0,ms=parseFloat(S.v.macdSig)||0,vx=parseFloat(S.v.vix)||20;
var lit=FIVE.filter(function(f){return S.c5[f.id];}).length;
var cs=FIVE.reduce(function(s,f){return s+(S.c5[f.id]?f.score:0);},0);
var t=0,rea=[],war=[];
if(rs>80){t-=30;war.push(“RSI短期”+rs+“→過熱域。追撃買い厳禁”);}
else if(rs>70){t-=15;war.push(“RSI短期”+rs+“→買われ過ぎ圏”);}
else if(rs<30){t+=30;rea.push(“RSI短期”+rs+“→売られ過ぎ。リバウンド期待”);}
else if(rs<40){t+=15;rea.push(“RSI短期”+rs+“→割安圏接近”);}
else{rea.push(“RSI短期”+rs+“→中立圏”);}
if(rl>75){t-=20;war.push(“RSI長期”+rl+“→長期でも過熱”);}
else if(rl<40){t+=20;rea.push(“RSI長期”+rl+“→長期でも割安”);}
if(m>ms){t+=20;rea.push(“MACD “+m.toFixed(0)+” ＞ シグナル “+ms.toFixed(0)+” →強気”);}
else if(m<ms){t-=20;war.push(“MACD “+m.toFixed(0)+” ＜ シグナル “+ms.toFixed(0)+” →弱気”);}
if(vx<15){t+=15;rea.push(“VIX “+vx+“→極めて安定”);}
else if(vx<20){t+=10;rea.push(“VIX “+vx+“→安定圏”);}
else if(vx>=30){t-=20;war.push(“VIX “+vx+“→高ボラティリティ”);}
if(p>ACQ){rea.push(“現値¥”+p.toLocaleString()+“＝含み益継続”);}
else if(p>0&&p<ACQ*0.95){t-=15;war.push(“現値¥”+p.toLocaleString()+“＝取得単価割れ”);}
var tn=Math.max(-50,Math.min(50,t*0.6));
var cn=(cs/110)*50;
var tot=Math.round(tn+cn);
var j;
if(lit>=4&&tot>=-10)j=“BUY”;
else if(lit>=3&&tot>=15)j=“BUY”;
else if(lit===0&&tot<=-20)j=“SELL”;
else if(tot>=30)j=“BUY”;
else if(tot<=-20)j=“SELL”;
else j=“HOLD”;
return{t:t,cs:cs,tot:tot,lit:lit,j:j,rea:rea,war:war};
}

function jc(j){return j===“BUY”?”#059669”:j===“SELL”?”#dc2626”:”#b45309”;}
function jbg(j){return j===“BUY”?”#f0fdf4”:j===“SELL”?”#fff1f2”:”#fffbeb”;}
function jlabel(j){return j===“BUY”?“🟢 今すぐ買い！”:j===“SELL”?“🔴 今すぐ売り！”:“🟡 今は待て。”;}
function jicon(j){return j===“BUY”?“🟢”:j===“SELL”?“🔴”:“🟡”;}

function parsePaste(txt){
var vals={},c5={};
var np={price:/price\s*=\s*([\d,]+)/i,rsiS:/rsiS\s*=\s*([\d.]+)/i,rsiL:/rsiL\s*=\s*([\d.]+)/i,macd:/macd\s*=\s*(-?[\d.]+)/i,macdSig:/macdSig\s*=\s*(-?[\d.]+)/i,vix:/vix\s*=\s*([\d.]+)/i};
var cp={vixPeak:/vixPeak\s*=\s*(true|false)/i,pcRatio:/pcRatio\s*=\s*(true|false)/i,volumeStable:/volumeStable\s*=\s*(true|false)/i,lowerWick:/lowerWick\s*=\s*(true|false)/i,maDeviation:/maDeviation\s*=\s*(true|false)/i};
Object.keys(np).forEach(function(k){var m=txt.match(np[k]);if(m)vals[k]=m[1].replace(/,/g,””);});
Object.keys(cp).forEach(function(k){var m=txt.match(cp[k]);if(m)c5[k]=m[1].toLowerCase()===“true”;});
var ai=txt.match(/KIOXIA_AI:\s*([\s\S]+?)(?=KIOXIA_|$)/i);
var ait=ai?ai[1].trim():””;
return{vals:vals,c5:c5,ait:ait,hv:Object.keys(vals).length>0,hc:Object.keys(c5).length>0,ha:ait.length>0};
}

function h(el,cls,inner,attr){attr=attr||””;return”<”+el+” class="”+cls+”" “+attr+”>”+inner+”</”+el+”>”;}
function d(cls,inner,attr){return h(“div”,cls,inner,attr);}
function btn(cls,lbl,fn,attr){attr=attr||””;return”<button class="”+cls+”" onclick="”+fn+”" “+attr+”>”+lbl+”</button>”;}

function renderPaste(){
var p=S.parsed,applied=S.applied,open=S.popen,copied=S.copied;
var LABELS={price:“現在値”,rsiS:“RSI短期”,rsiL:“RSI長期”,macd:“MACD”,macdSig:“シグナル”,vix:“VIX”};
var CLABELS={vixPeak:“①VIXピークアウト”,pcRatio:“②P/C比率”,volumeStable:“③出来高安定”,lowerWick:“④下ヒゲ”,maDeviation:“⑤MA乖離”};
var body=””;
if(open){
body+=”<div class='card' style='background:#f8fafc'>”;
body+=”<div style='font-size:11px;font-weight:700;margin-bottom:8px'>📋 3ステップで完了</div>”;
[{n:“①”,c:”#2563eb”,t:“iSPEEDのチャート画面をスクリーンショット”},{n:“②”,c:”#9333ea”,t:“このチャット（Claude）に画像と下のプロンプトを送る”},{n:“③”,c:”#059669”,t:“Claudeの返答をコピー → 下の欄に貼り付け → 反映ボタン”}].forEach(function(s){
body+=”<div style='display:flex;gap:8px;align-items:flex-start;margin-bottom:6px'><div style='width:20px;height:20px;border-radius:50%;background:"+s.c+";color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0'>”+s.n+”</div><div style='font-size:12px;line-height:1.6'>”+s.t+”</div></div>”;
});
body+=”<div style='font-size:10px;color:#64748b;margin:8px 0 4px'>💬 送るプロンプト：</div>”;
body+=”<div class='pbox'>”+PROMPT.slice(0,150)+”…</div>”;
body+=btn(“cbtn”,copied?“✅ コピーしました！”:“📋 プロンプト全文をコピー”,“copyPrompt()”);
body+=”</div>”;
body+=”<div><div style='font-size:12px;font-weight:700;margin-bottom:6px'>③ Claudeの返答を貼り付け：</div>”;
body+=”<textarea class='ptarea"+(p?" ok":"")+"' id='pta' rows='5' oninput='onPaste(this.value)' placeholder='KIOXIA_DATA:\nprice=...\n...\nKIOXIA_AI:\n解説...'>”+S.pt+”</textarea></div>”;
if(p&&p.hv){
body+=”<div style='background:#eff6ff;border:1px solid #2563eb44;border-radius:7px;padding:9px'><div style='font-size:11px;font-weight:700;color:#2563eb;margin-bottom:6px'>📊 検出された数値</div><div class='pvgrid'>”;
Object.keys(p.vals).forEach(function(k){body+=”<div class='pvi'><div class='pvl'>”+(LABELS[k]||k)+”</div><div class='pvv'>”+p.vals[k]+”</div></div>”;});
body+=”</div></div>”;
}
if(p&&p.hc){
body+=”<div class='card'><div style='font-size:11px;font-weight:700;color:#059669;margin-bottom:6px'>✅ Claudeによる5指標判定</div>”;
Object.keys(p.c5).forEach(function(k){var v=p.c5[k];body+=”<div style='display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:5px;background:"+(v?"#dcfce7":"#f1f5f9")+";margin-bottom:4px;font-size:12px;color:"+(v?"#059669":"#64748b")+";font-weight:"+(v?"700":"400")+"'>”+(v?“✅”:“⬜”)+” “+(CLABELS[k]||k)+”<span style='margin-left:auto;font-weight:800'>”+(v?“点灯”:“未点灯”)+”</span></div>”;});
body+=”</div>”;
}
if(p&&p.ha){
body+=”<div><div style='font-size:11px;font-weight:700;color:#d97706;margin-bottom:5px'>🤖 AI相場解説</div><div class='ai-box'>”+p.ait+”</div></div>”;
}
if(p){body+=btn(“abtn”,“✅ 数値・5指標・AI解説をすべて反映する”,“applyP()”);}
if(applied){body+=”<div class='appd'>🎉 すべてのデータが反映されました！</div>”;}
}
var hc=applied?”#059669”:”#2563eb”;
var hbg=applied?”#f0fdf4”:”#eff6ff”;
var ht=applied?“✅ Claude解析：全項目反映済み”:“📷 Claudeスクショ解析（最速・全自動）”;
var hs=applied?“数値・5指標・AI解説がすべて自動入力されました”:“スクショ → Claudeに送る → 貼り付けるだけで全自動反映”;
return “<div class='paste-panel' style='border-color:"+hc+"'><div class='paste-hd' style='background:"+hbg+"' onclick='toggleP()'><div><div style='font-size:13px;font-weight:900;color:"+hc+"'>”+ht+”</div><div style='font-size:11px;color:#64748b;margin-top:2px'>”+hs+”</div></div><div style='font-size:16px;color:#64748b'>”+(open?“▲”:“▼”)+”</div></div>”+(open?”<div class='paste-body'>”+body+”</div>”:””)+”</div>”;
}

function renderJudge(){
var r=calc();
var c=jc(r.j),bg=jbg(r.j);
var cl=Math.max(-50,Math.min(100,r.tot));
var bl=r.tot>=0?“50%”:(50+cl/2)+”%”;
var bw=Math.abs(cl/2)+”%”;
var FIELDS=[
{k:“price”,l:“現在値 (¥)”,c:”#d97706”,h:“銘柄情報→右上の大きい株価数字”},
{k:“rsiS”,l:“RSI 短期”,c:”#9333ea”,h:“チャート→RSIパネル ピンクの数値”},
{k:“rsiL”,l:“RSI 長期”,c:”#059669”,h:“チャート→RSIパネル 緑の数値”},
{k:“macd”,l:“MACD値”,c:”#9333ea”,h:“チャート→MACDパネル ピンクの数値”},
{k:“macdSig”,l:“MACDシグナル”,c:”#059669”,h:“チャート→MACDパネル 緑の数値”},
{k:“vix”,l:“VIX指数”,c:”#0891b2”,h:“マイページ→VIX指数”}
];
var lit=r.lit,cs=r.cs;
var html=renderPaste();

// 判定バナー
html+=”<div class='jbanner' style='background:linear-gradient(135deg,"+bg+",#f8fafc);border-color:"+c+"'>”;
html+=”<div class='jicon'>”+jicon(r.j)+”</div>”;
html+=”<div class='jlabel' style='color:"+c+"'>”+jlabel(r.j)+”</div>”;
html+=”<div class='jsub'>”+(r.j===“BUY”?“複数シグナルが買いを示唆”:r.j===“SELL”?“複数シグナルが売りを示唆”:“判断が拮抗。見送りが最善”)+”</div>”;
html+=”<div class='score-row'>”;
[{l:“テクニカル”,v:r.t,c:”#2563eb”},{l:“5指標”,v:r.cs,c:”#059669”},{l:“総合スコア”,v:r.tot,c:c}].forEach(function(s){

function tc(id){S.c5[id]=!S.c5[id];rd();}

function copyPrompt(){
if(navigator.clipboard){navigator.clipboard.writeText(PROMPT).then(function(){S.copied=true;rd();setTimeout(function(){S.copied=false;rd();},2000);});}
else{var ta=document.createElement(“textarea”);ta.value=PROMPT;document.body.appendChild(ta);ta.select();document.execCommand(“copy”);document.body.removeChild(ta);S.copied=true;rd();setTimeout(function(){S.copied=false;rd();},2000);}
}
function onPaste(txt){S.pt=txt;if(!txt.trim()){S.parsed=null;S.applied=false;rd();return;}var p=parsePaste(txt);S.parsed=(p.hv||p.hc||p.ha)?p:null;S.applied=false;rd();}

function startOc(id){var e=S.journal.find(function(j){return j.id===id;});S.editId=id;S.oc=e?e.oc:””;rd();}
