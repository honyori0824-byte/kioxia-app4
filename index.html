<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f4f8;font-family:monospace;color:#0f172a;padding-bottom:80px;}
button,input,textarea{font-family:monospace;cursor:pointer;}

.hd{background:#1e293b;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99;}
.badge{background:#d97706;color:#fff;font-weight:900;font-size:12px;padding:3px 8px;border-radius:4px;margin-right:8px;}

/* ══ アラートバナー ══ */
.alert-banner{position:fixed;top:0;left:0;right:0;z-index:999;padding:0;pointer-events:none;}
.alert-item{display:flex;align-items:center;gap:10px;padding:14px 16px;animation:slideDown .3s ease;}
.alert-item.sell{background:#dc2626;}
.alert-item.buy{background:#059669;}
.alert-item.warn{background:#d97706;}
.alert-icon{font-size:24px;flex-shrink:0;}

.pg{padding:14px 16px;display:flex;flex-direction:column;gap:12px;}

.sbar-wrap{width:100%;max-width:300px;}
.sbar-lbl{display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-bottom:3px;}

.isec{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;}
.isec-hd{padding:10px 14px;border-bottom:1px solid #e2e8f0;}

/* アラート中の入力欄ハイライト */

.rbox{background:#fff;border-radius:10px;padding:12px 14px;}
.ritem{font-size:11px;line-height:1.6;margin-bottom:5px;padding-left:8px;border-left:2px solid;}

.paste-panel{background:#fff;border:2px solid #2563eb;border-radius:12px;overflow:hidden;}

.abtn{width:100%;padding:12px;border-radius:8px;background:#059669;color:#fff;font-weight:900;font-size:14px;border:none;}
.appd{padding:10px;background:#f0fdf4;border:1px solid #059669;border-radius:7px;font-size:12px;color:#059669;font-weight:700;text-align:center;}

.al-desc{font-size:10px;color:#64748b;margin-top:2px;}
.al-input{width:90px;border:1.5px solid #e2e8f0;border-radius:6px;padding:7px 9px;font-size:15px;font-weight:800;text-align:right;outline:none;background:#f8fafc;font-family:monospace;}
.al-toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.al-toggle input{opacity:0;width:0;height:0;}
.al-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#e2e8f0;border-radius:24px;transition:.3s;}

.al-toggle input:checked+.al-slider{background:#059669;}
.al-toggle input:checked+.al-slider:before{transform:translateX(20px);}

.al-hist-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;border:1px solid;}
.al-hist-sell{background:#fff1f2;border-color:#dc262644;}
.al-hist-buy{background:#f0fdf4;border-color:#05996944;}

.jentry{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:10px;}
.je-hd{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;border-bottom:1px solid #e2e8f0;}
.je-scores{display:grid;grid-template-columns:repeat(5,1fr);padding:7px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;}
.jes{text-align:center;}
.jesl{font-size:9px;color:#64748b;}
.jesv{font-size:11px;font-weight:700;}
.je-body{padding:10px 12px;}
.tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;}
.oc-area{display:flex;align-items:center;gap:7px;margin-top:7px;}
.oc-text{font-size:11px;color:#059669;padding:5px 8px;border-radius:5px;background:#f0fdf4;border:1px solid #05996933;flex:1;}
.oc-empty{font-size:11px;color:#94a3b8;font-style:italic;}
.aopt{padding:8px 5px;border-radius:7px;font-size:11px;border:2px solid #e2e8f0;background:#f8fafc;color:#64748b;transition:all .15s;}
.aopt.on{font-weight:800;}

/* ══ デイトレタブ ══ */
.dt-banner{border-radius:14px;border:3px solid;padding:16px;display:flex;align-items:center;gap:14px;transition:all .3s;}
.dt-banner.sell{background:#fff1f2;border-color:#dc2626;box-shadow:0 0 24px #dc262633;}
.dt-banner.buy{background:#f0fdf4;border-color:#059669;box-shadow:0 0 24px #05996933;}
.dt-banner.hold{background:#fffbeb;border-color:#d97706;}
.dt-icon{font-size:44px;flex-shrink:0;}
.dt-label{font-size:26px;font-weight:900;}
.dt-sub{font-size:12px;margin-top:3px;opacity:.8;}
.dt-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dt-input-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;}
.dt-input-label{font-size:10px;color:#64748b;margin-bottom:4px;}
.dt-input{width:100%;border:none;font-size:22px;font-weight:900;outline:none;background:transparent;font-family:monospace;}
.dt-rule{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:6px;}
.dt-rule.sell{background:#fff1f2;color:#dc2626;border:1px solid #dc262633;}
.dt-rule.buy{background:#f0fdf4;color:#059669;border:1px solid #05996933;}
.dt-rule.hold{background:#fffbeb;color:#b45309;border:1px solid #d9770633;}
.dt-rule.off{background:#f8fafc;color:#94a3b8;border:1px solid #e2e8f0;}
.sim-result{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;}
.sim-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:13px;}
.sim-row:last-child{border-bottom:none;}
.sim-label{color:#64748b;}
.sim-val{font-weight:800;}
.rule-edit{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:8px;}
.rule-edit-hd{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e2e8f0;background:#f8fafc;}
.rule-edit-body{padding:10px 12px;display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;}
.rule-op{font-size:12px;color:#64748b;font-weight:700;}
.rule-input{width:90px;border:1.5px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:15px;font-weight:800;text-align:right;outline:none;background:#f8fafc;font-family:monospace;}
</style>

<body>
<div id="alertBanner"></div>
<div id="root"></div>
<script>
var ACQ=22721,SH=300;
var FIVE=[
  {id:"vixPeak",label:"① VIXピークアウト確認",desc:"VIXが40〜50台から低下に転じている",score:25},
  {id:"pcRatio",label:"② P/C比率が低水準",desc:"70%台以下＝極度の悲観→反発サイン",score:20},
  {id:"volumeStable",label:"③ 出来高：急増後に安定",desc:"記録的出来高で急落→その後縮小して安定",score:20},
  {id:"lowerWick",label:"④ 長い下ヒゲ出現",desc:"ローソク足の下ヒゲが実体の2倍以上",score:25},
  {id:"maDeviation",label:"⑤ 25日MA乖離率プラス転換",desc:"マイナス乖離がプラスに転じる＝自律反発",score:20}
];
var ACTS=[
  {id:"buy_new",label:"🟢 新規買い",c:"#059669"},
  {id:"buy_add",label:"➕ 買い増し",c:"#059669"},
  {id:"sell_part",label:"📤 部分利確",c:"#0891b2"},
  {id:"sell_all",label:"🔴 全売り",c:"#dc2626"},
  {id:"hold",label:"⏸ ホールド",c:"#b45309"},
  {id:"watch",label:"👀 様子見",c:"#64748b"}
];
var PROMPT="このiSPEEDのスクリーンショットを分析して、以下の専用フォーマットで返してください。\n\nKIOXIA_DATA:\nprice=（現在値）\nrsiS=（RSI短期）\nrsiL=（RSI長期）\nmacd=（MACD値）\nmacdSig=（MACDシグナル）\nvix=（VIX指数）\n\nKIOXIA_5CHECK:\nvixPeak=（true/false）\npcRatio=（true/false）\nvolumeStable=（true/false）\nlowerWick=（true/false）\nmaDeviation=（true/false）\n\nKIOXIA_AI:\n（現在の相場状況・注目ポイント・今日のアクション提案を200〜300文字で）";

// ══════════════════════════════════════
//  アラート設定（タカさん専用デフォルト値）
// ══════════════════════════════════════
var DEFAULT_ALERTS = [
  // 売りアラート
  {id:"rsiS_danger", type:"sell", label:"🚨 RSI短期 極限過熱",  desc:"今すぐ利確！天井サイン",       field:"rsiS", op:"gt", val:90,    enabled:true,  triggered:false},
  {id:"rsiS_warn",   type:"warn", label:"⚠️ RSI短期 過熱注意",  desc:"利確を検討し始めるタイミング", field:"rsiS", op:"gt", val:80,    enabled:true,  triggered:false},
  {id:"price_high1", type:"sell", label:"🎯 利確目標① ¥32,000",desc:"100株売りを検討",              field:"price",op:"gt", val:32000,  enabled:true,  triggered:false},
  {id:"price_high2", type:"sell", label:"🎯 利確目標② ¥35,000",desc:"さらに100株売りを検討",        field:"price",op:"gt", val:35000,  enabled:true,  triggered:false},
  // 買いアラート
  {id:"rsiS_buy",    type:"buy",  label:"🟢 RSI短期 買い場接近",desc:"押し目買いのチャンス！",       field:"rsiS", op:"lt", val:35,    enabled:true,  triggered:false},
  {id:"rsiS_strong", type:"buy",  label:"💎 RSI短期 強い買いサイン",desc:"迷わず買い増し検討！",    field:"rsiS", op:"lt", val:25,    enabled:true,  triggered:false},
  {id:"price_low",   type:"warn", label:"⛔ 損切り検討 ¥26,000", desc:"損切りラインに接近",          field:"price",op:"lt", val:26000,  enabled:true,  triggered:false},
  // VIXアラート
  {id:"vix_panic",   type:"buy",  label:"🌡 VIX 恐怖指数 急騰",  desc:"底値圏接近。冷静に準備",      field:"vix",  op:"gt", val:35,    enabled:true,  triggered:false},
];

var S={
  tab:"judge",
  v:{price:"35950",rsiS:"95.55",rsiL:"81.44",macd:"2849.45",macdSig:"1480.90",vix:"16.00"},
  c5:{vixPeak:true,pcRatio:false,volumeStable:false,lowerWick:false,maDeviation:true},
  ai:"",pt:"",parsed:null,applied:false,popen:true,copied:false,
  journal:[],jform:false,jact:"hold",jmemo:"",
  editId:null,oc:"",
  alerts: JSON.parse(JSON.stringify(DEFAULT_ALERTS)),
  alertHistory: [],
  activeAlerts: [],   // 現在表示中のアラート
  alertSound: true,
  // ══ デイトレ用ステート ══
  dt: {price:"36070", rsiS:"55", macd:"50", macdSig:"48"},
  sim: {shares:"300", buyPrice:"22721", sellPrice:"36070", sellShares:"100"},
  dtRules: [
    {id:"r1",type:"sell",label:"🚨 RSI短期 95超 → 全売り",    field:"rsiS", op:"gt",    val:95,    val2:0,  action:"全売り推奨",     enabled:true},
    {id:"r2",type:"sell",label:"⚠️ RSI短期 85超 → 部分利確",  field:"rsiS", op:"gt",    val:85,    val2:0,  action:"100株利確検討",  enabled:true},
    {id:"r3",type:"sell",label:"🎯 株価 ¥37,000超 → 利確",    field:"price",op:"gt",    val:37000, val2:0,  action:"段階的利確",     enabled:true},
    {id:"r4",type:"buy", label:"🟢 RSI短期 30未満 → 押し目",  field:"rsiS", op:"lt",    val:30,    val2:0,  action:"押し目買い検討", enabled:true},
    {id:"r5",type:"buy", label:"💎 RSI短期 20未満 → 即買い",  field:"rsiS", op:"lt",    val:20,    val2:0,  action:"迷わず買い増し", enabled:true},
    {id:"r6",type:"hold",label:"⏸ RSI 40〜70 → ホールド",    field:"rsiS", op:"range", val:40,    val2:70, action:"ポジション維持", enabled:true},
  ],
  dtEditRule: null,
};

// ══════════════════════════════════════
//  アラート判定エンジン
// ══════════════════════════════════════
var FIELD_MAP = {
  price: function(){return parseFloat(S.v.price)||0;},
  rsiS:  function(){return parseFloat(S.v.rsiS)||0;},
  rsiL:  function(){return parseFloat(S.v.rsiL)||0;},
  vix:   function(){return parseFloat(S.v.vix)||0;},
};

function checkAlerts(){
  var fired = [];
  S.alerts.forEach(function(al){
    if(!al.enabled) return;
    var cur = FIELD_MAP[al.field] ? FIELD_MAP[al.field]() : 0;
    var hit = (al.op==="gt" && cur >= al.val) || (al.op==="lt" && cur <= al.val && cur > 0);
    if(hit && !al.triggered){
      al.triggered = true;
      fired.push({id:al.id, type:al.type, label:al.label, desc:al.desc, val:cur, time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})});
    } else if(!hit){
      al.triggered = false; // リセット（条件外れたら再発火可能に）
    }
  });
  if(fired.length > 0){
    fired.forEach(function(f){
      S.alertHistory.unshift(f);
      S.activeAlerts.unshift(f);
    });
    if(S.alertHistory.length > 20) S.alertHistory = S.alertHistory.slice(0,20);
    playAlertSound(fired[0].type);
    showAlertBanner();
    rd();
  }
}

function playAlertSound(type){
  if(!S.alertSound) return;
  try{
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var count = type==="sell" ? 3 : type==="buy" ? 2 : 1;
    for(var i=0;i<count;i++){
      (function(idx){
        setTimeout(function(){
          var o=ctx.createOscillator();
          var g=ctx.createGain();
          o.connect(g);g.connect(ctx.destination);
          o.frequency.value = type==="sell" ? 880 : type==="buy" ? 660 : 440;
          g.gain.setValueAtTime(0.3,ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
          o.start(ctx.currentTime);o.stop(ctx.currentTime+0.2);
        }, idx*300);
      })(i);
    }
  }catch(e){}
}

function showAlertBanner(){
  var el = document.getElementById("alertBanner");
  if(!el || S.activeAlerts.length===0) return;
  var al = S.activeAlerts[0];

function calc(){
  var p=parseFloat(S.v.price)||0,rs=parseFloat(S.v.rsiS)||50,rl=parseFloat(S.v.rsiL)||50;
  var m=parseFloat(S.v.macd)||0,ms=parseFloat(S.v.macdSig)||0,vx=parseFloat(S.v.vix)||20;
  var lit=FIVE.filter(function(f){return S.c5[f.id];}).length;
  var cs=FIVE.reduce(function(s,f){return s+(S.c5[f.id]?f.score:0);},0);
  var t=0,rea=[],war=[];
  if(rs>80){t-=30;war.push("RSI短期"+rs+"→過熱域。追撃買い厳禁");}
  else if(rs>70){t-=15;war.push("RSI短期"+rs+"→買われ過ぎ圏");}
  else if(rs<30){t+=30;rea.push("RSI短期"+rs+"→売られ過ぎ。リバウンド期待");}
  else if(rs<40){t+=15;rea.push("RSI短期"+rs+"→割安圏接近");}
  else{rea.push("RSI短期"+rs+"→中立圏");}
  if(rl>75){t-=20;war.push("RSI長期"+rl+"→長期でも過熱");}
  else if(rl<40){t+=20;rea.push("RSI長期"+rl+"→長期でも割安");}
  if(m>ms){t+=20;rea.push("MACD "+m.toFixed(0)+" ＞ シグナル "+ms.toFixed(0)+" →強気");}
  else if(m<ms){t-=20;war.push("MACD "+m.toFixed(0)+" ＜ シグナル "+ms.toFixed(0)+" →弱気");}
  if(vx<15){t+=15;rea.push("VIX "+vx+"→極めて安定");}
  else if(vx<20){t+=10;rea.push("VIX "+vx+"→安定圏");}
  else if(vx>=30){t-=20;war.push("VIX "+vx+"→高ボラティリティ");}
  if(p>ACQ){rea.push("現値¥"+p.toLocaleString()+"＝含み益継続");}
  else if(p>0&&p<ACQ*0.95){t-=15;war.push("現値¥"+p.toLocaleString()+"＝取得単価割れ");}
  var tn=Math.max(-50,Math.min(50,t*0.6));
  var cn=(cs/110)*50;
  var tot=Math.round(tn+cn);
  var j;
  if(lit>=4&&tot>=-10)j="BUY";
  else if(lit>=3&&tot>=15)j="BUY";
  else if(lit===0&&tot<=-20)j="SELL";
  else if(tot>=30)j="BUY";
  else if(tot<=-20)j="SELL";
  else j="HOLD";
  return{t:t,cs:cs,tot:tot,lit:lit,j:j,rea:rea,war:war};
}

function jc(j){return j==="BUY"?"#059669":j==="SELL"?"#dc2626":"#b45309";}
function jbg(j){return j==="BUY"?"#f0fdf4":j==="SELL"?"#fff1f2":"#fffbeb";}
function jlabel(j){return j==="BUY"?"🟢 今すぐ買い！":j==="SELL"?"🔴 今すぐ売り！":"🟡 今は待て。";}
function jicon(j){return j==="BUY"?"🟢":j==="SELL"?"🔴":"🟡";}

function parsePaste(txt){
  var vals={},c5={};
  var np={price:/price\s*=\s*([\d,]+)/i,rsiS:/rsiS\s*=\s*([\d.]+)/i,rsiL:/rsiL\s*=\s*([\d.]+)/i,macd:/macd\s*=\s*(-?[\d.]+)/i,macdSig:/macdSig\s*=\s*(-?[\d.]+)/i,vix:/vix\s*=\s*([\d.]+)/i};
  var cp={vixPeak:/vixPeak\s*=\s*(true|false)/i,pcRatio:/pcRatio\s*=\s*(true|false)/i,volumeStable:/volumeStable\s*=\s*(true|false)/i,lowerWick:/lowerWick\s*=\s*(true|false)/i,maDeviation:/maDeviation\s*=\s*(true|false)/i};
  Object.keys(np).forEach(function(k){var m=txt.match(np[k]);if(m)vals[k]=m[1].replace(/,/g,"");});
  Object.keys(cp).forEach(function(k){var m=txt.match(cp[k]);if(m)c5[k]=m[1].toLowerCase()==="true";});
  var ai=txt.match(/KIOXIA_AI:\s*([\s\S]+?)(?=KIOXIA_|$)/i);
  var ait=ai?ai[1].trim():"";
  return{vals:vals,c5:c5,ait:ait,hv:Object.keys(vals).length>0,hc:Object.keys(c5).length>0,ha:ait.length>0};
}

function evalDtRules(){
  var p=parseFloat(S.dt.price)||0;
  var rs=parseFloat(S.dt.rsiS)||0;
  var m=parseFloat(S.dt.macd)||0;
  var ms=parseFloat(S.dt.macdSig)||0;
  var FMAP={price:p, rsiS:rs};
  var fired=[];
  S.dtRules.forEach(function(r){
    if(!r.enabled)return;
    var cur=FMAP[r.field]||0;
    var hit=false;
    if(r.op==="gt")hit=cur>r.val&&cur>0;
    else if(r.op==="lt")hit=cur>0&&cur<r.val;
    else if(r.op==="range")hit=cur>=r.val&&cur<=r.val2;
    if(hit)fired.push(r);
  });
  return fired;
}

}

function saveJ(){var m=document.getElementById("jm");var memo=m?m.value:"";var r=calc();var v=S.v;var now=new Date();var e={id:Date.now(),dt:now.toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}),p:parseFloat(v.price)||0,rs:parseFloat(v.rsiS)||0,rl:parseFloat(v.rsiL)||0,vx:parseFloat(v.vix)||0,lit:r.lit,sc:r.tot,j:r.j,act:S.jact,memo:memo,oc:""};S.journal=[e].concat(S.journal);S.jform=false;S.jmemo="";rd();}

rd();
