<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="KIOXIA"/>
<meta name="theme-color" content="#1e293b"/>
<title>KIOXIA 285A 判断エンジン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f4f8;--surface:#fff;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;
  --bull:#059669;--bear:#dc2626;--warn:#b45309;
  --accent:#d97706;--blue:#2563eb;--purple:#9333ea;
  --header:#1e293b;
}
body{background:var(--bg);font-family:'Courier New',monospace;color:var(--text);padding-bottom:60px;}
input,textarea,button,select{font-family:'Courier New',monospace;}
button{cursor:pointer;}

/* ヘッダー */
.header{background:var(–header);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.badge-285a{background:var(–accent);color:#fff;font-weight:900;font-size:12px;padding:3px 8px;border-radius:5px;}
.header-title{color:#f1f5f9;font-weight:700;font-size:14px;margin-left:10px;}
.header-price{color:#34d399;font-size:22px;font-weight:900;text-align:right;}
.header-change{font-size:11px;text-align:right;}

/* NAV */
.nav{display:flex;background:var(–header);border-bottom:1px solid #334155;overflow-x:auto;padding:0 18px;}
.nav button{background:transparent;border:none;color:#94a3b8;font-size:12px;padding:12px 14px;border-bottom:2px solid transparent;font-family:inherit;font-weight:400;white-space:nowrap;transition:all .15s;}
.nav button.active{color:#fbbf24;border-bottom-color:#fbbf24;font-weight:700;}

/* カード */
.card{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:16px;}
.stitle{font-size:11px;color:var(–muted);text-transform:uppercase;letter-spacing:1.3px;margin-bottom:8px;}

/* パネル */
.panel{padding:16px 18px;display:flex;flex-direction:column;gap:14px;}

/* スクショ連携 */
.paste-panel{background:var(–surface);border:2px solid var(–blue);border-radius:14px;overflow:hidden;}
.paste-header{padding:12px 16px;background:#eff6ff;border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.paste-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.step-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0;}
.prompt-box{background:#1e293b;border-radius:8px;padding:10px 12px;font-size:11px;color:#94a3b8;font-family:monospace;line-height:1.7;white-space:pre-wrap;margin:8px 0;}
.copy-btn{width:100%;padding:10px;border-radius:8px;background:var(–blue);color:#fff;font-weight:800;font-size:13px;border:none;}
.paste-area{width:100%;background:#f8fafc;border:1.5px solid var(–border);border-radius:10px;padding:12px;font-size:12px;color:var(–text);font-family:monospace;outline:none;resize:vertical;line-height:1.7;min-height:120px;}
.paste-area.ok{background:#f0fdf4;border-color:var(–bull);}
.preview-box{background:#eff6ff;border:1px solid #2563eb44;border-radius:8px;padding:10px 12px;}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.preview-item{background:#fff;border-radius:6px;padding:6px 8px;text-align:center;border:1px solid #2563eb22;}
.preview-label{font-size:9px;color:var(–muted);}
.preview-val{font-size:13px;font-weight:800;color:var(–blue);}
.check-preview{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.check-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;font-size:12px;}
.check-row.on{background:#dcfce7;color:var(–bull);font-weight:700;}
.check-row.off{background:#f1f5f9;color:var(–muted);}
.ai-preview{background:#fffbeb;border:1px solid #d9770644;border-radius:8px;padding:10px 12px;font-size:12px;color:var(–text);line-height:1.8;margin-top:4px;white-space:pre-wrap;}
.apply-btn{width:100%;padding:14px;border-radius:10px;background:var(–bull);color:#fff;font-weight:900;font-size:15px;border:none;box-shadow:0 4px 16px #05966944;}
.applied-msg{padding:12px;background:#f0fdf4;border:1px solid var(–bull);border-radius:8px;font-size:13px;color:var(–bull);font-weight:700;text-align:center;}

/* 判定バナー */
.judge-banner{padding:24px 16px;border-radius:16px;border:2px solid;display:flex;flex-direction:column;align-items:center;gap:10px;}
.judge-icon{font-size:52px;}
.judge-label{font-size:32px;font-weight:900;letter-spacing:1px;}
.judge-sub{font-size:13px;color:var(–muted);}
.score-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.score-item{text-align:center;min-width:80px;}
.score-item-label{font-size:10px;color:var(–muted);margin-bottom:4px;}
.score-item-val{font-size:22px;font-weight:900;}
.score-bar-wrap{width:100%;max-width:340px;margin-top:4px;}
.score-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(–muted);margin-bottom:4px;}
.score-bar-track{height:10px;background:#e2e8f0;border-radius:5px;position:relative;}
.score-bar-fill{position:absolute;height:100%;border-radius:5px;transition:all .4s;}
.score-bar-center{position:absolute;left:50%;top:-3px;width:2px;height:16px;background:var(–muted);transform:translateX(-50%);}
.score-bar-nums{display:flex;justify-content:space-between;font-size:9px;color:var(–muted);margin-top:2px;}

/* 入力セクション */
.input-section{background:var(–surface);border:1px solid var(–border);border-radius:12px;overflow:hidden;}
.input-section-header{padding:10px 14px;border-bottom:1px solid var(–border);}
.input-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(–border);transition:background .15s;}
.input-row:last-child{border-bottom:none;}
.input-row.focused{background:#eff6ff;}
.input-label{font-size:13px;font-weight:700;}
.input-hint{font-size:10px;color:var(–blue);margin-top:2px;}
.num-input{width:120px;border-radius:7px;padding:9px 11px;font-size:17px;font-weight:800;outline:none;text-align:right;border:1.5px solid var(–border);background:#f8fafc;transition:all .15s;}
.num-input:focus{background:#fff;}

/* 5指標 */
.check-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 12px;border-radius:9px;background:#f8fafc;border:1.5px solid var(–border);transition:all .15s;margin-bottom:8px;}
.check-item.lit{background:#f0fdf4;border-color:var(–bull);box-shadow:0 0 0 3px #05966918;}
.check-box{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:all .15s;border:2px solid var(–border);background:#fff;}
.check-box.lit{background:var(–bull);border-color:var(–bull);}
.check-title{font-size:13px;font-weight:700;}
.check-title.lit{color:var(–bull);}
.check-desc{font-size:10px;color:var(–muted);margin-top:2px;}
.check-score{font-size:10px;font-weight:800;padding:1px 7px;border-radius:12px;background:var(–border);color:var(–muted);}
.check-score.lit{background:var(–bull);color:#fff;}
.check-summary{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;background:#f8fafc;border:1px solid var(–border);}

/* 根拠パネル */
.reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.reason-box{background:var(–surface);border-radius:12px;padding:14px 16px;}
.reason-box.buy{border:1px solid #05996944;}
.reason-box.sell{border:1px solid #dc262644;}
.reason-item{font-size:12px;color:var(–text);line-height:1.6;margin-bottom:6px;padding-left:8px;border-left:2px solid;}
.reason-item.buy{border-color:var(–bull);}
.reason-item.sell{border-color:var(–bear);}

/* AI解説 */
.ai-panel{background:var(–surface);border:2px solid var(–accent);border-radius:16px;overflow:hidden;}
.ai-panel-header{padding:12px 16px;background:linear-gradient(135deg,#fffbeb,#f8fafc);border-bottom:1px solid var(–border);display:flex;justify-content:space-between;align-items:center;}
.ai-text{font-size:14px;color:var(–text);line-height:2;white-space:pre-wrap;padding:16px;}
.disclaimer{margin:0 16px 16px;padding:8px 12px;border-radius:6px;background:#fffbeb;border:1px solid #d9770644;font-size:10px;color:var(–muted);}

/* 日誌 */
.journal-entry{background:var(–surface);border:1px solid var(–border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.entry-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(–border);}
.entry-scores{display:grid;grid-template-columns:repeat(5,1fr);padding:8px 14px;gap:4px;background:#f8fafc;border-bottom:1px solid var(–border);}
.entry-score{text-align:center;}
.entry-score-label{font-size:9px;color:var(–muted);}
.entry-score-val{font-size:12px;font-weight:700;}
.entry-body{padding:12px 14px;}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;display:inline-block;}
.outcome-area{display:flex;align-items:center;gap:8px;margin-top:8px;}
.outcome-text{font-size:12px;color:var(–bull);padding:6px 10px;border-radius:6px;background:#f0fdf4;border:1px solid #05996944;flex:1;}
.outcome-empty{font-size:11px;color:var(–muted);font-style:italic;}

/* アクションボタン */
.action-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.action-opt{padding:10px 6px;border-radius:8px;font-size:12px;font-family:inherit;border:2px solid var(–border);background:#f8fafc;color:var(–muted);transition:all .15s;}
.action-opt.selected{font-weight:800;}

/* ロジック解説 */
.logic-box{background:#f8fafc;border:1px solid var(–border);border-radius:12px;padding:14px 16px;}
.logic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.logic-col-title{font-size:11px;font-weight:700;margin-bottom:6px;}
.logic-item{font-size:11px;color:var(–muted);line-height:1.7;padding-left:8px;border-left:2px solid;}
.rule-box{padding:8px 12px;border-radius:6px;background:#eff6ff;border:1px solid #2563eb44;font-size:11px;color:var(–muted);line-height:1.7;}

/* スピナー */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:3px solid var(–border);border-top-color:var(–accent);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}

/* empty state */
.empty-state{background:var(–surface);border:2px dashed var(–border);border-radius:12px;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(–muted);text-align:center;}
.empty-icon{font-size:40px;}
</style>

</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════
//  定数・データ
// ═══════════════════════════════════════
const ACQ = 22721, SHARES = 300;

const FIVE = [
  {id:"vixPeak",      label:"① VIXピークアウト確認",    desc:"VIXが40〜50台から低下に転じている",       score:25},
  {id:"pcRatio",      label:"② P/C比率が低水準",        desc:"70%台以下 = 極度の悲観 → 反発サイン",    score:20},
  {id:"volumeStable", label:"③ 出来高：急増後に安定",   desc:"記録的出来高で急落→その後縮小して安定",   score:20},
  {id:"lowerWick",    label:"④ 長い下ヒゲ出現",         desc:"ローソク足の下ヒゲが実体の2倍以上",       score:25},
  {id:"maDeviation",  label:"⑤ 25日MA乖離率プラス転換", desc:"マイナス乖離がプラスに転じる = 自律反発", score:20},
];

const ACTIONS = [
  {id:"buy_new",   label:"🟢 新規買い",  color:"#059669"},
  {id:"buy_add",   label:"➕ 買い増し",  color:"#059669"},
  {id:"sell_part", label:"📤 部分利確",  color:"#0891b2"},
  {id:"sell_all",  label:"🔴 全売り",    color:"#dc2626"},
  {id:"hold",      label:"⏸ ホールド",  color:"#b45309"},
  {id:"watch",     label:"👀 様子見",    color:"#64748b"},
];

const PROMPT = `このiSPEEDのスクリーンショットを分析して、以下の専用フォーマットで返してください。

KIOXIA_DATA:
price=（現在値）
rsiS=（RSI短期）
rsiL=（RSI長期）
macd=（MACD値）
macdSig=（MACDシグナル）
vix=（VIX指数。画面にない場合は直近値）

KIOXIA_5CHECK:
vixPeak=（true/false）
pcRatio=（true/false）
volumeStable=（true/false）
lowerWick=（true/false）
maDeviation=（true/false）

KIOXIA_AI:
（現在の相場状況・注目ポイント・今日のアクション提案を200〜300文字で）`;

// ═══════════════════════════════════════
//  状態管理
// ═══════════════════════════════════════
let state = {
  tab: "judge",
  vals: {price:"30500", rsiS:"100.00", rsiL:"75.37", macd:"114.77", macdSig:"72.70", vix:"19.23"},
  checks5: {vixPeak:false, pcRatio:false, volumeStable:true, lowerWick:false, maDeviation:true},
  aiText: "",
  pasteText: "",
  parsed: null,
  applied: false,
  pasteOpen: true,
  copiedPrompt: false,
  journal: [],
  showJournalForm: false,
  journalAction: "hold",
  journalMemo: "",
  editOutcomeId: null,
  outcomeText: "",
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ═══════════════════════════════════════
//  判定ロジック
// ═══════════════════════════════════════
function calcJudgment() {
  const v = state.vals, c = state.checks5;
  const price = parseFloat(v.price)||0;
  const rsiS  = parseFloat(v.rsiS)||50;
  const rsiL  = parseFloat(v.rsiL)||50;
  const macd  = parseFloat(v.macd)||0;
  const sig   = parseFloat(v.macdSig)||0;
  const vix   = parseFloat(v.vix)||20;
  const litCount = FIVE.filter(f=>c[f.id]).length;
  const checkScore = FIVE.reduce((s,f)=>s+(c[f.id]?f.score:0),0);

  let tech=0; const reasons=[], warnings=[];
  if(rsiS>80){tech-=30;warnings.push(`RSI短期 ${rsiS} → 過熱域（80超）。追撃買いは厳禁`);}
  else if(rsiS>70){tech-=15;warnings.push(`RSI短期 ${rsiS} → 買われ過ぎ圏`);}
  else if(rsiS<30){tech+=30;reasons.push(`RSI短期 ${rsiS} → 売られ過ぎ。強いリバウンド期待`);}
  else if(rsiS<40){tech+=15;reasons.push(`RSI短期 ${rsiS} → 割安圏接近`);}
  else{reasons.push(`RSI短期 ${rsiS} → 中立圏`);}

  if(rsiL>75){tech-=20;warnings.push(`RSI長期 ${rsiL} → 長期でも過熱`);}
  else if(rsiL<40){tech+=20;reasons.push(`RSI長期 ${rsiL} → 長期でも割安`);}

  if(macd>sig){tech+=20;reasons.push(`MACD ${macd.toFixed(0)} ＞ シグナル ${sig.toFixed(0)} → 強気`);}
  else if(macd<sig){tech-=20;warnings.push(`MACD ${macd.toFixed(0)} ＜ シグナル ${sig.toFixed(0)} → 弱気`);}

  if(vix<15){tech+=15;reasons.push(`VIX ${vix} → 極めて安定`);}
  else if(vix<20){tech+=10;reasons.push(`VIX ${vix} → 安定圏`);}
  else if(vix<30){tech-=5;}
  else{tech-=20;warnings.push(`VIX ${vix} → 高ボラティリティ`);}

  if(price>0){
    const p=((price-ACQ)/ACQ*100).toFixed(1);
    if(price>ACQ*1.35)warnings.push(`現値 ¥${price.toLocaleString()} = +${p}%。利確検討ゾーン`);
    else if(price>ACQ)reasons.push(`現値 ¥${price.toLocaleString()} = +${p}%。含み益継続`);
    else if(price<ACQ*0.95){tech-=15;warnings.push(`現値 ¥${price.toLocaleString()} = 取得単価割れ`);}
  }

  const techNorm = Math.max(-50,Math.min(50,tech*0.6));
  const checkNorm = (checkScore/110)*50;
  const total = Math.round(techNorm+checkNorm);

  let judgment;
  if(litCount>=4&&total>=-10) judgment="BUY";
  else if(litCount>=3&&total>=15) judgment="BUY";
  else if(litCount===0&&total<=-20) judgment="SELL";
  else if(total>=30) judgment="BUY";
  else if(total<=-20) judgment="SELL";
  else judgment="HOLD";

  return {tech, checkScore, total, litCount, judgment, reasons, warnings};
}

// ═══════════════════════════════════════
//  フォーマットパーサー
// ═══════════════════════════════════════
function parsePaste(text) {
  const vals={}, checks5={};
  const num={price:/price\s*=\s*([\d,]+)/i, rsiS:/rsiS\s*=\s*([\d.]+)/i, rsiL:/rsiL\s*=\s*([\d.]+)/i, macd:/macd\s*=\s*(-?[\d.]+)/i, macdSig:/macdSig\s*=\s*(-?[\d.]+)/i, vix:/vix\s*=\s*([\d.]+)/i};
  const chk={vixPeak:/vixPeak\s*=\s*(true|false)/i, pcRatio:/pcRatio\s*=\s*(true|false)/i, volumeStable:/volumeStable\s*=\s*(true|false)/i, lowerWick:/lowerWick\s*=\s*(true|false)/i, maDeviation:/maDeviation\s*=\s*(true|false)/i};
  Object.entries(num).forEach(([k,re])=>{const m=text.match(re);if(m)vals[k]=m[1].replace(/,/g,"");});
  Object.entries(chk).forEach(([k,re])=>{const m=text.match(re);if(m)checks5[k]=m[1].toLowerCase()==="true";});
  const ai=text.match(/KIOXIA_AI:\s*([\s\S]+?)(?=KIOXIA_|$)/i);
  const aiText=ai?ai[1].trim():"";
  const hasVals=Object.keys(vals).length>0;
  const hasChecks=Object.keys(checks5).length>0;
  return{vals,checks5,aiText,hasVals,hasChecks,hasAI:aiText.length>0};
}

// ═══════════════════════════════════════
//  HTML生成ヘルパー
// ═══════════════════════════════════════
function tag(t,cls,html,attrs=""){return`<${t} class="${cls}" ${attrs}>${html}</${t}>`;}
function div(cls,html,attrs=""){return tag("div",cls,html,attrs);}
function btn(cls,html,onclick,attrs=""){return`<button class="${cls}" onclick="${onclick}" ${attrs}>${html}</button>`;}
function colorFor(j){return j==="BUY"?"#059669":j==="SELL"?"#dc2626":"#b45309";}
function bgFor(j){return j==="BUY"?"#f0fdf4":j==="SELL"?"#fff1f2":"#fffbeb";}
function labelFor(j){return j==="BUY"?"🟢 今すぐ買い！":j==="SELL"?"🔴 今すぐ売り！":"🟡 今は待て。";}

// ═══════════════════════════════════════
//  各パネルのHTML生成
// ═══════════════════════════════════════

function renderPastePanel() {
  const {parsed, pasteText, applied, pasteOpen, copiedPrompt} = state;
  const shortPrompt = PROMPT.slice(0,120)+"...";

  let inner = "";
  if(pasteOpen) {
    // 手順ガイド
    inner += div("card", `
      <div class="stitle">📋 3ステップで全自動</div>
      ${[
        {n:"①",c:"#2563eb",t:"iSPEEDのチャート画面をスクリーンショット（RSI・MACD表示中）"},
        {n:"②",c:"#9333ea",t:"このチャット（Claude）に画像と下のプロンプトを送る"},
        {n:"③",c:"#059669",t:"Claudeの返答をコピー → 下の欄に貼り付け → 「全て反映」ボタン"},
      ].map(s=>`<div class="step-row"><div class="step-num" style="background:${s.c}">${s.n}</div><div style="font-size:12px;line-height:1.7">${s.t}</div></div>`).join("")}
      <div style="font-size:11px;color:var(--muted);margin:8px 0 4px">💬 送るプロンプト：</div>
      <div class="prompt-box">${shortPrompt}</div>
      ${btn("copy-btn", copiedPrompt?"✅ コピーしました！":"📋 プロンプト全文をコピー", "copyPrompt()")}
    `);

    // 貼り付けエリア
    inner += `
      <div>
        <div style="font-size:12px;font-weight:700;margin-bottom:6px">③ Claudeの返答をここに貼り付け：</div>
        <textarea class="paste-area ${parsed?"ok":""}" id="pasteArea" rows="6"
          placeholder="KIOXIA_DATA:\nprice=30500\nrsiS=100.00\n...\n\nKIOXIA_5CHECK:\nvixPeak=false\n...\n\nKIOXIA_AI:\n解説テキスト..."
          oninput="onPasteChange(this.value)">${pasteText}</textarea>

```
  </div>`;

// プレビュー
if(parsed && parsed.hasVals) {

judgment:r.judgment, action:state.journalAction, memo, outcome:””,
};
setState({journal:[entry,…state.journal],showJournalForm:false,journalMemo:””});
}
function deleteJournal(id){if(confirm(“この記録を削除しますか？”))setState({journal:state.journal.filter(e=>e.id!==id)});}
function startEditOutcome(id){const e=state.journal.find(j=>j.id===id);setState({editOutcomeId:id,outcomeText:e?.outcome||””});}
function saveOutcome(id){
setState({
journal:state.journal.map(e=>e.id===id?{…e,outcome:state.outcomeText}:e),
editOutcomeId:null,outcomeText:””,
});
}

// 起動
render();
</script>
