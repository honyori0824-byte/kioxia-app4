const STOOQ_BASE = "https://stooq.com/q/d/l/";

const fetchStooqHistory = async (symbol, days = 30) => {
  const url = `${STOOQ_BASE}?s=${symbol}&i=d`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const lines = text.trim().split("\n").slice(1); // skip header
  return lines
    .slice(-days)
    .map(line => {
      const [date, open, high, low, close, volume] = line.split(",");
      if (!close || isNaN(parseFloat(close))) return null;
      const d = new Date(date);
      return {
        date:   `${d.getMonth()+1}/${d.getDate()}`,
        dateISO: date,
        open:   parseFloat(open),
        high:   parseFloat(high),
        low:    parseFloat(low),
        close:  parseFloat(close),
        volume: parseInt(volume) || 0,
      };
    })
    .filter(Boolean);
};

const calcSMA=(data,p)=>data.map((_,i)=>i<p-1?null:Math.round(data.slice(i-p+1,i+1).reduce((s,d)=>s+d.close,0)/p));
const calcRSI=(data,p=14)=>data.map((_,i)=>{
  if(i<p)return null;
  let g=0,l=0;
  for(let j=i-p+1;j<=i;j++){const d=data[j].close-data[j-1].close;d>0?g+=d:l-=d;}
  return Math.round((100-100/(1+g/(l||1)))*10)/10;
});
const calcBoll=(data,p=20)=>{
  const sma=calcSMA(data,p);
  return data.map((_,i)=>{
    if(i<p-1)return{upper:null,lower:null};
    const sl=data.slice(i-p+1,i+1).map(d=>d.close),std=Math.sqrt(sl.reduce((s,v)=>s+(v-sma[i])**2,0)/p);
    return{upper:Math.round(sma[i]+2*std),lower:Math.round(sma[i]-2*std)};
  });
};
const calcMACD=(data)=>{
  const ema=(arr,p)=>{const k=2/(p+1);let prev=arr[0];return arr.map((v,i)=>i===0?v:(prev=v*k+prev*(1-k),Math.round(prev)));};
  const c=data.map(d=>d.close),e12=ema(c,12),e26=ema(c,26),ml=e12.map((v,i)=>v-e26[i]),sig=ema(ml,9);
  return ml.map((v,i)=>({macd:v,signal:sig[i],hist:v-sig[i]}));
};

// ── 強化版 判定ロジック（テクニカル + 5指標の合議） ──
const calcJudgment = (v, checks5) => {
  const price    = parseFloat(v.price)   || 0;
  const rsiS     = parseFloat(v.rsiS)    || 50;
  const rsiL     = parseFloat(v.rsiL)    || 50;
  const macd     = parseFloat(v.macd)    || 0;
  const macdSig  = parseFloat(v.macdSig) || 0;
  const vix      = parseFloat(v.vix)     || 20;
  const acq      = 22721;

  const reasons  = [];
  const warnings = [];
  let techScore  = 0;  // テクニカル3指標スコア（-100〜+100）
  let checkScore = 0;  // 5指標チェックスコア（0〜110）
  const litCount = FIVE_INDICATORS.filter(i => checks5[i.id]).length;

  // ══ テクニカル3指標 ══

  // RSI短期
  if      (rsiS > 80) { techScore -= 30; warnings.push(`RSI短期 ${rsiS} → 過熱域（80超）。短期天井リスク`); }
  else if (rsiS > 70) { techScore -= 15; warnings.push(`RSI短期 ${rsiS} → 買われ過ぎ圏`); }
  else if (rsiS < 30) { techScore += 30; reasons.push(`RSI短期 ${rsiS} → 売られ過ぎ。強いリバウンド期待`); }
  else if (rsiS < 40) { techScore += 15; reasons.push(`RSI短期 ${rsiS} → 割安圏に接近`); }
  else                {                  reasons.push(`RSI短期 ${rsiS} → 中立圏`); }

  // RSI長期
  if      (rsiL > 75) { techScore -= 20; warnings.push(`RSI長期 ${rsiL} → 長期でも過熱。上値が重い`); }
  else if (rsiL > 60) { techScore -=  5; }
  else if (rsiL < 35) { techScore += 20; reasons.push(`RSI長期 ${rsiL} → 長期的な底値圏。絶好の仕込み場`); }
  else if (rsiL < 50) { techScore += 10; reasons.push(`RSI長期 ${rsiL} → 長期でも割安圏`); }

  // MACD
  if (macd !== 0 && macdSig !== 0) {
    if      (macd > macdSig) { techScore += 20; reasons.push(`MACD ${macd.toFixed(0)} ＞ シグナル ${macdSig.toFixed(0)} → 強気トレンド継続`); }
    else if (macd < macdSig) { techScore -= 20; warnings.push(`MACD ${macd.toFixed(0)} ＜ シグナル ${macdSig.toFixed(0)} → 弱気トレンド`); }
  }

  // VIX
  if      (vix < 15) { techScore += 15; reasons.push(`VIX ${vix} → 極めて安定。リスクオン全開`); }
  else if (vix < 20) { techScore += 10; reasons.push(`VIX ${vix} → 安定圏。買いやすい環境`); }
  else if (vix < 25) { techScore +=  0; reasons.push(`VIX ${vix} → やや警戒。慌てずに`); }
  else if (vix < 35) { techScore -= 10; warnings.push(`VIX ${vix} → 高ボラティリティ。慎重に`); }
  else               { techScore -= 25; warnings.push(`VIX ${vix} → 極度の恐怖。追加買いは厳禁`); }

  // 株価 vs 取得単価
  if (price > 0) {
    const diffPct = ((price - acq) / acq * 100).toFixed(1);
    if      (price > acq * 1.35) { warnings.push(`現値 ¥${price.toLocaleString()} = 取得単価比 +${diffPct}%。利確検討ゾーン`); }
    else if (price > acq)        { reasons.push(`現値 ¥${price.toLocaleString()} = 取得単価比 +${diffPct}%。含み益継続`); }
    else if (price < acq * 0.95) { techScore -= 15; warnings.push(`現値 ¥${price.toLocaleString()} = 取得単価割れ。損切り検討`); }
  }

  // ══ 5指標チェックリストスコア ══
  FIVE_INDICATORS.forEach(ind => {
    if (checks5[ind.id]) checkScore += ind.score;
  });

  // ══ 合議スコア計算 ══
  // テクニカル（最大±85）を正規化 → -50〜+50 相当に圧縮
  const techNorm   = Math.max(-50, Math.min(50, techScore * 0.6));
  // 5指標（最大110点）を0〜50相当に変換
  const checkNorm  = (checkScore / 110) * 50;
  // 合算（-50〜+100の範囲になる。5指標が揃うほど買いに傾く）
  const totalScore = Math.round(techNorm + checkNorm);

  // ── 5指標の点灯数によるオーバーライドルール ──
  // 4つ以上点灯 → テクニカルが弱くても「買い検討」
  // 0つ点灯 かつ テクニカル弱気 → 「強い売り」
  let judgment;
  if      (litCount >= 4 && totalScore >= -10)  judgment = "BUY";
  else if (litCount >= 3 && totalScore >= 15)   judgment = "BUY";
  else if (litCount === 0 && totalScore <= -20)  judgment = "SELL";
  else if (totalScore >= 30)                     judgment = "BUY";
  else if (totalScore <= -20)                    judgment = "SELL";
  else                                           judgment = "HOLD";

  return {
    techScore, checkScore, totalScore, litCount,
    judgment, reasons, warnings,
  };
};

//  フロー：
//    ① iSPEEDのスクショをこのチャット（Claude）に画像として送る
//    ② Claudeが数値・5指標・AI解説を専用フォーマットで返す

// ── Claudeが返す専用フォーマットのパーサー ──
const parseClaudeOutput = (text) => {
  const vals    = {};
  const checks5 = {};
  let   aiText  = "";

  // --- 数値 ---
  const numPatterns = {
    price:   /price\s*=\s*([\d,]+)/i,
    rsiS:    /rsiS\s*=\s*([\d.]+)/i,
    rsiL:    /rsiL\s*=\s*([\d.]+)/i,
    macd:    /macd\s*=\s*(-?[\d.]+)/i,
    macdSig: /macdSig\s*=\s*(-?[\d.]+)/i,
    vix:     /vix\s*=\s*([\d.]+)/i,
  };
  Object.entries(numPatterns).forEach(([key, re]) => {
    const m = text.match(re);
    if (m) vals[key] = m[1].replace(/,/g, "");
  });

  // --- 5指標チェック ---
  const checkPatterns = {
    vixPeak:      /vixPeak\s*=\s*(true|false)/i,
    pcRatio:      /pcRatio\s*=\s*(true|false)/i,
    volumeStable: /volumeStable\s*=\s*(true|false)/i,
    lowerWick:    /lowerWick\s*=\s*(true|false)/i,
    maDeviation:  /maDeviation\s*=\s*(true|false)/i,
  };
  Object.entries(checkPatterns).forEach(([key, re]) => {
    const m = text.match(re);
    if (m) checks5[key] = m[1].toLowerCase() === "true";
  });

  // --- AI解説 ---
  // KIOXIA_AI: 以降の行を全部取得
  const aiMatch = text.match(/KIOXIA_AI:\s*([\s\S]+?)(?=KIOXIA_|$)/i)
    || text.match(/AI解説:\s*([\s\S]+?)(?=KIOXIA_|$)/i);
  if (aiMatch) aiText = aiMatch[1].trim();

  return { vals, checks5, aiText,
    hasVals:    Object.keys(vals).length > 0,
    hasChecks:  Object.keys(checks5).length > 0,
    hasAI:      aiText.length > 0,
  };
};

// ═══════════════════════════════════════════════════════════════
//  AI解説パネル — Claude API を使って現在の状況を日本語で解説
// ═══════════════════════════════════════════════════════════════
const AiExplanationPanel = ({ vals, checks5, result }) => {
  const [explanation, setExplanation] = useState("");
  const [loading,     setLoading]     = useState(false);
  const [error,       setError]       = useState("");
  const [lastFetched, setLastFetched] = useState(null);

  const litNames = FIVE_INDICATORS
    .filter(i => checks5[i.id])
    .map(i => i.label);
  const unlitNames = FIVE_INDICATORS
    .filter(i => !checks5[i.id])
    .map(i => i.label);

  const buildPrompt = () => `
あなたはプロの株式アナリストです。以下のデータをもとに、キオクシアホールディングス（285A）の現在の相場状況と売買判断を、投資家タカさんに向けて日本語で解説してください。

【現在のデータ】
- 現在値：¥${parseFloat(vals.price).toLocaleString()}（取得単価 ¥22,721）
- RSI 短期：${vals.rsiS}　長期：${vals.rsiL}
- MACD：${vals.macd}　シグナル：${vals.macdSig}　ヒストグラム：${(parseFloat(vals.macd) - parseFloat(vals.macdSig)).toFixed(0)}
- VIX：${vals.vix}

【5指標チェックリスト】
- 点灯（${litNames.length}個）：${litNames.length > 0 ? litNames.join("、") : "なし"}
- 未点灯（${unlitNames.length}個）：${unlitNames.length > 0 ? unlitNames.join("、") : "なし"}

【エンジン判定結果】
- テクニカルスコア：${result.techScore > 0 ? "+" : ""}${result.techScore}点
- 5指標スコア：${result.checkScore}点 / 110点
- 総合スコア：${result.totalScore > 0 ? "+" : ""}${result.totalScore}点
- 最終判定：${result.judgment === "BUY" ? "買い" : result.judgment === "SELL" ? "売り" : "様子見"}

以下の構成で、200〜300文字程度で簡潔に解説してください：
1. 現在の相場状況（一言で）
2. 注目すべきポイント（良い点・悪い点）
3. 具体的なアクション提案（今日何をすべきか）

話し方は「タカさんへの直接アドバイス」として、専門的すぎず、でも的確に。文末は「〜です。〜ます。」調で統一してください。
`;

  const fetchExplanation = async () => {
    setLoading(true);
    setError("");
    setExplanation("");
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "content-type": "application/json",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [
            { role: "user", content: buildPrompt() }
          ],
        }),
      });

      const data = await response.json();

      // content配列からtextブロックを結合
      const text = (data.content || [])
        .filter(block => block.type === "text")
        .map(block => block.text)
        .join("\n");

      if (!text) throw new Error("応答テキストが空です");

      setExplanation(text);
      setLastFetched(new Date().toLocaleTimeString("ja-JP", {hour:"2-digit", minute:"2-digit"}));
    } catch(e) {
      setError(`エラー：${e.message}`);
    } finally {
      setLoading(false);
    }
  };

  const jColor = result.judgment === "BUY" ? C.bull : result.judgment === "SELL" ? C.bear : C.warn;

  return (
    <div style={{
      background: C.surface,
      border: `2px solid ${jColor}44`,
      borderRadius: 16,
      overflow: "hidden",
    }}>
      {/* ヘッダー */}
      <div style={{
        padding: "14px 18px",
        background: `linear-gradient(135deg, ${jColor}11, #f8fafc)`,
        borderBottom: `1px solid ${C.border}`,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        gap: 12, flexWrap: "wrap",
      }}>
        <div>
          <div style={{fontSize:13, fontWeight:800, color:C.text, marginBottom:2}}>
            🤖 Claude AI による相場解説
          </div>
          <div style={{fontSize:11, color:C.muted}}>
            現在の指標をもとに、今日の判断をわかりやすく解説します
          </div>
        </div>
        <button
          onClick={fetchExplanation}
          disabled={loading}
          style={{
            padding: "10px 20px",
            borderRadius: 8,
            background: loading ? C.border : jColor,
            color: loading ? C.muted : "#fff",
            fontWeight: 800, fontSize: 13,
            border: "none", cursor: loading ? "not-allowed" : "pointer",
            fontFamily: "inherit", transition: "all .2s",
            display: "flex", alignItems: "center", gap: 6,
            flexShrink: 0,
          }}
        >
          {loading
            ? <><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⏳</span> 解説生成中…</>
            : "✨ AI解説を生成する"
          }
        </button>
      </div>

      {/* 本文エリア */}
      <div style={{padding: "16px 18px", minHeight: 80}}>
        {!explanation && !loading && !error && (
          <div style={{
            display:"flex", flexDirection:"column", alignItems:"center",
            justifyContent:"center", padding:"20px 0", gap:8, color:C.muted,
          }}>
            <div style={{fontSize:32}}>💬</div>
            <div style={{fontSize:13}}>ボタンを押すと、現在の指標をClaudeが分析して解説します</div>
            <div style={{fontSize:11, color:C.muted}}>
              RSI・MACD・VIX・5指標の全データを自動で送信します
            </div>
          </div>
        )}

        {loading && (
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 0",color:C.muted}}>
            <div style={{
              width:24, height:24,
              border:`3px solid ${C.border}`,
              borderTopColor:jColor,
              borderRadius:"50%",
              animation:"spin .8s linear infinite",
              flexShrink:0,
            }}/>
            <div>
              <div style={{fontSize:13,color:C.text,marginBottom:2}}>Claudeが分析中です…</div>
              <div style={{fontSize:11,color:C.muted}}>RSI・MACD・5指標を総合的に判断しています</div>
            </div>
          </div>
        )}

        {error && !loading && (
          <div style={{display:"flex", flexDirection:"column", gap:10}}>
            <div style={{
              padding:"12px 14px", borderRadius:8,
              background:"#fff1f2", border:`1px solid ${C.bear}44`,
              fontSize:12, color:C.bear, lineHeight:1.7,
            }}>
              ⚠️ {error}
            </div>
            {/* プロンプト確認用（デバッグ） */}
            <details>
              <summary style={{fontSize:11, color:C.muted, cursor:"pointer", userSelect:"none"}}>
                📋 送信したプロンプトを確認する（デバッグ用）
              </summary>
              <pre style={{
                marginTop:8, padding:"10px 12px", borderRadius:6,
                background:"#f8fafc", border:`1px solid ${C.border}`,
                fontSize:10, color:C.muted, whiteSpace:"pre-wrap",
                lineHeight:1.6, overflowX:"auto",
              }}>
                {buildPrompt()}
              </pre>
            </details>
          </div>
        )}

        {explanation && !loading && (
          <div>
            {/* 解説テキスト */}
            <div style={{
              fontSize:14, color:C.text, lineHeight:1.9,
              whiteSpace:"pre-wrap",
              padding:"4px 0",
            }}>
              {explanation}
            </div>

            {/* メタ情報 */}
            <div style={{
              marginTop:12, display:"flex", alignItems:"center",
              justifyContent:"space-between", flexWrap:"wrap", gap:8,
            }}>
              <div style={{fontSize:10, color:C.muted}}>
                🤖 Claude claude-sonnet-4-20250514 による解説　|　生成時刻: {lastFetched}
              </div>
              <button
                onClick={fetchExplanation}
                style={{
                  padding:"4px 12px", borderRadius:6,
                  background:"transparent", color:C.muted,
                  border:`1px solid ${C.border}`,
                  fontSize:11, cursor:"pointer", fontFamily:"inherit",
                }}
              >
                🔄 再生成
              </button>
            </div>

            {/* 免責 */}
            <div style={{
              marginTop:8, padding:"8px 12px", borderRadius:6,
              background:"#fffbeb", border:`1px solid ${C.accent}44`,
              fontSize:10, color:C.muted, lineHeight:1.6,
            }}>
              ⚠️ AI解説は情報提供を目的としたものです。投資判断はご自身の責任で行ってください。
            </div>
          </div>
        )}
      </div>

      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

const ScoreGauge=({score})=>{
  const r=64,cx=80,cy=80,total=220,toRad=d=>(d*Math.PI)/180;
  const arc=(from,to,rad)=>{
    const s={x:cx+rad*Math.cos(toRad(-from)),y:cy-rad*Math.sin(toRad(-from))};
    const e={x:cx+rad*Math.cos(toRad(-to)),y:cy-rad*Math.sin(toRad(-to))};
    return `M ${s.x} ${s.y} A ${rad} ${rad} 0 ${Math.abs(to-from)>180?1:0} 1 ${e.x} ${e.y}`;
  };
  const color=score>=60?C.bull:score>=40?C.accent:C.bear;
  return (
    <svg width={160} height={110} viewBox="0 0 160 110">
      <path d={arc(200,-20,r)} fill="none" stroke={C.border} strokeWidth={10} strokeLinecap="round"/>
      <path d={arc(200,200-(score/100)*total,r)} fill="none" stroke={color} strokeWidth={10} strokeLinecap="round"/>
      <text x={cx} y={cy+4} textAnchor="middle" fill={color} fontSize={26} fontWeight={800}>{score}</text>
      <text x={cx} y={cy+22} textAnchor="middle" fill={C.muted} fontSize={11}>{score>=60?"好環境":score>=40?"中立":"警戒"}</text>
    </svg>
  );
};

//  📒 トレード日誌 — 判断の記録・振り返り
// ═══════════════════════════════════════════════════════════════

const ACTION_OPTIONS = [
  { id:"buy_new",   label:"新規買い",     color:C.bull,  icon:"🟢" },
  { id:"buy_add",   label:"買い増し",     color:C.bull,  icon:"➕" },
  { id:"sell_part", label:"部分利確",     color:C.cyan,  icon:"📤" },
  { id:"sell_all",  label:"全売り",       color:C.bear,  icon:"🔴" },
  { id:"hold",      label:"ホールド",     color:C.warn,  icon:"⏸"  },
  { id:"watch",     label:"様子見",       color:C.muted, icon:"👀" },
];

const JournalPanel = ({ journalEntries, setJournalEntries, currentVals, currentResult }) => {
  const [showForm,  setShowForm]  = useState(false);
  const [action,    setAction]    = useState("hold");
  const [memo,      setMemo]      = useState("");
  const [outcome,   setOutcome]   = useState(""); // 後日記入：実際の結果
  const [editOutcomeId, setEditOutcomeId] = useState(null);
  const [outcomeText,   setOutcomeText]   = useState("");
  const [filterAction,  setFilterAction]  = useState("all");

  const saveEntry = () => {
    const now = new Date();
    const entry = {
      id:         Date.now(),
      datetime:   now.toLocaleString("ja-JP", { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" }),
      isoDate:    now.toISOString(),
      price:      parseFloat(currentVals.price) || 0,
      rsiS:       parseFloat(currentVals.rsiS)  || 0,
      rsiL:       parseFloat(currentVals.rsiL)  || 0,
      macd:       parseFloat(currentVals.macd)  || 0,
      macdSig:    parseFloat(currentVals.macdSig) || 0,
      vix:        parseFloat(currentVals.vix)   || 0,
      judgment:   currentResult.judgment,
      techScore:  currentResult.techScore,
      checkScore: currentResult.checkScore,
      totalScore: currentResult.totalScore,
      litCount:   currentResult.litCount,
      action,
      memo,
      outcome: "",   // 後日記入
    };
    setJournalEntries(prev => [entry, ...prev]);
    setMemo("");
    setShowForm(false);
  };

  const saveOutcome = (id) => {
    setJournalEntries(prev =>
      prev.map(e => e.id === id ? { ...e, outcome: outcomeText } : e)
    );
    setEditOutcomeId(null);
    setOutcomeText("");
  };

  const deleteEntry = (id) => {
    if (window.confirm("この記録を削除しますか？")) {
      setJournalEntries(prev => prev.filter(e => e.id !== id));
    }
  };

  const filtered = filterAction === "all"
    ? journalEntries
    : journalEntries.filter(e => e.action === filterAction);

  const jColor = (j) => j === "BUY" ? C.bull : j === "SELL" ? C.bear : C.warn;
  const jLabel = (j) => j === "BUY" ? "🟢 買い" : j === "SELL" ? "🔴 売り" : "🟡 様子見";
  const aOpt   = (id) => ACTION_OPTIONS.find(a => a.id === id) || ACTION_OPTIONS[5];

  // 統計
  const stats = {
    total:   journalEntries.length,
    buyDays: journalEntries.filter(e => e.judgment === "BUY").length,
    avgScore: journalEntries.length
      ? Math.round(journalEntries.reduce((s,e) => s + e.totalScore, 0) / journalEntries.length)
      : 0,
    withOutcome: journalEntries.filter(e => e.outcome).length,
  };

  return (
    <div style={{display:"flex", flexDirection:"column", gap:14}}>

      {/* ── ヘッダー + 記録ボタン ── */}
      <div style={{
        background: C.surface, border:`1px solid ${C.border}`, borderRadius:12,
        padding:"16px 18px", display:"flex", alignItems:"center",
        justifyContent:"space-between", gap:12, flexWrap:"wrap",
      }}>
        <div>
          <div style={{fontSize:15, fontWeight:800, color:C.text, marginBottom:2}}>
            📒 トレード日誌
          </div>
          <div style={{fontSize:11, color:C.muted}}>
            判断の記録・振り返りで投資力を磨く　|　全 {stats.total} 件記録済み
          </div>
        </div>
        <button
          onClick={() => setShowForm(p => !p)}
          style={{
            padding:"10px 18px", borderRadius:8,
            background: showForm ? C.border : C.accent,
            color: showForm ? C.muted : "#fff",
            fontWeight:800, fontSize:13, border:"none",
            cursor:"pointer", fontFamily:"inherit", transition:"all .2s",
          }}
        >
          {showForm ? "✕ キャンセル" : "＋ 今の判断を記録する"}
        </button>
      </div>

      {/* ── 記録フォーム ── */}
      {showForm && (
        <div style={{
          background:"#fffbeb", border:`2px solid ${C.accent}`,
          borderRadius:12, padding:"18px",
          display:"flex", flexDirection:"column", gap:14,
        }}>
          <div style={{fontSize:13, fontWeight:700, color:C.accent}}>
            ✍️ 今日の判断を記録する（{new Date().toLocaleDateString("ja-JP")}）
          </div>

          {/* 現在の判定サマリー */}
          <div style={{
            display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8,
            padding:"12px", borderRadius:8, background:"#fff",
            border:`1px solid ${C.border}`,
          }}>
            {[
              { label:"現在値",    val:`¥${(parseFloat(currentVals.price)||0).toLocaleString()}`, color:C.text },
              { label:"AI判定",    val:jLabel(currentResult.judgment), color:jColor(currentResult.judgment) },
              { label:"総合スコア",val:`${currentResult.totalScore > 0 ? "+" : ""}${currentResult.totalScore}点`, color:jColor(currentResult.judgment) },
              { label:"5指標",     val:`${currentResult.litCount}/5点灯`, color:C.bull },
            ].map(k => (
              <div key={k.label} style={{textAlign:"center"}}>
                <div style={{fontSize:10, color:C.muted, marginBottom:3}}>{k.label}</div>
                <div style={{fontSize:13, fontWeight:800, color:k.color}}>{k.val}</div>
              </div>
            ))}
          </div>

          {/* 実際のアクション選択 */}
          <div>
            <div style={{fontSize:12, color:C.muted, marginBottom:8, fontWeight:600}}>
              実際に取ったアクション（または予定）
            </div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8}}>
              {ACTION_OPTIONS.map(opt => (
                <button key={opt.id} onClick={() => setAction(opt.id)}
                  style={{
                    padding:"10px 8px", borderRadius:8, cursor:"pointer",
                    background: action === opt.id ? opt.color+"22" : "#f8fafc",
                    border:`2px solid ${action === opt.id ? opt.color : C.border}`,
                    color: action === opt.id ? opt.color : C.muted,
                    fontWeight: action === opt.id ? 800 : 400,
                    fontSize:12, fontFamily:"inherit", transition:"all .15s",
                  }}>
                  {opt.icon} {opt.label}
                </button>
              ))}
            </div>
          </div>

          {/* メモ */}
          <div>
            <div style={{fontSize:12, color:C.muted, marginBottom:6, fontWeight:600}}>
              判断メモ（なぜその行動を取ったか）
            </div>
            <textarea
              value={memo}
              onChange={e => setMemo(e.target.value)}
              placeholder="例：RSIが過熱域だが5指標が3つ点灯しているのでホールド継続。明日の出来高を確認してから判断する。"
              rows={3}
              style={{
                width:"100%", boxSizing:"border-box",
                background:"#fff", border:`1px solid ${C.border}`,
                borderRadius:8, padding:"10px 12px",
                fontSize:13, color:C.text, fontFamily:"inherit",
                outline:"none", resize:"vertical", lineHeight:1.6,
              }}
            />
          </div>

          <button onClick={saveEntry}
            style={{
              padding:"12px", borderRadius:8,
              background:C.bull, color:"#fff",
              fontWeight:800, fontSize:14, border:"none",
              cursor:"pointer", fontFamily:"inherit",
            }}>
            💾 記録を保存する
          </button>
        </div>
      )}

      {/* ── 統計サマリー ── */}
      {journalEntries.length > 0 && (
        <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10}}>
          {[
            { label:"記録件数",     val:`${stats.total}件`,        color:C.text  },
            { label:"買い判定日",   val:`${stats.buyDays}日`,      color:C.bull  },
            { label:"平均スコア",   val:`${stats.avgScore > 0 ? "+" : ""}${stats.avgScore}点`, color:C.blue  },
            { label:"結果記入済み", val:`${stats.withOutcome}件`,  color:C.cyan  },
          ].map(s => (
            <div key={s.label} style={{
              background:C.surface, border:`1px solid ${C.border}`,
              borderRadius:10, padding:"12px 14px", textAlign:"center",
            }}>
              <div style={{fontSize:10, color:C.muted, marginBottom:4}}>{s.label}</div>
              <div style={{fontSize:18, fontWeight:800, color:s.color}}>{s.val}</div>
            </div>
          ))}
        </div>
      )}

      {/* ── フィルター ── */}
      {journalEntries.length > 0 && (
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          {[{id:"all",label:"すべて"}, ...ACTION_OPTIONS].map(opt => (
            <button key={opt.id} onClick={() => setFilterAction(opt.id)}
              style={{
                padding:"5px 12px", borderRadius:20, fontSize:11,
                background: filterAction === opt.id ? C.accent : "transparent",
                color: filterAction === opt.id ? "#fff" : C.muted,
                border:`1px solid ${filterAction === opt.id ? C.accent : C.border}`,
                cursor:"pointer", fontFamily:"inherit", fontWeight: filterAction === opt.id ? 700 : 400,
              }}>
              {opt.icon || "📋"} {opt.label}
            </button>
          ))}
        </div>
      )}

      {/* ── 日誌一覧 ── */}
      {journalEntries.length === 0 ? (
        <div style={{
          background:C.surface, border:`2px dashed ${C.border}`,
          borderRadius:12, padding:"40px 20px",
          display:"flex", flexDirection:"column", alignItems:"center", gap:10, color:C.muted,
        }}>
          <div style={{fontSize:40}}>📒</div>
          <div style={{fontSize:14, fontWeight:600, color:C.text}}>まだ記録がありません</div>
          <div style={{fontSize:12}}>「今の判断を記録する」ボタンで最初の記録を追加しましょう</div>
        </div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          {filtered.map(entry => {
            const ao = aOpt(entry.action);
            const isEditingOutcome = editOutcomeId === entry.id;
            return (
              <div key={entry.id} style={{
                background:C.surface, border:`1px solid ${C.border}`,
                borderRadius:12, overflow:"hidden",
              }}>
                {/* エントリーヘッダー */}
                <div style={{
                  display:"flex", alignItems:"center", justifyContent:"space-between",
                  padding:"12px 16px", flexWrap:"wrap", gap:8,
                  borderBottom:`1px solid ${C.border}`,
                  background: entry.judgment === "BUY" ? "#f0fdf4"
                            : entry.judgment === "SELL" ? "#fff1f2" : "#fffbeb",
                }}>
                  <div style={{display:"flex", alignItems:"center", gap:10}}>
                    <div style={{fontSize:11, color:C.muted}}>{entry.datetime}</div>
                    <span style={{
                      fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:12,
                      background: jColor(entry.judgment)+"22",
                      color: jColor(entry.judgment),
                      border:`1px solid ${jColor(entry.judgment)}44`,
                    }}>
                      {jLabel(entry.judgment)}
                    </span>
                    <span style={{
                      fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:12,
                      background: ao.color+"22", color: ao.color,
                      border:`1px solid ${ao.color}44`,
                    }}>
                      {ao.icon} {ao.label}
                    </span>
                  </div>
                  <button onClick={() => deleteEntry(entry.id)}
                    style={{fontSize:11, color:C.muted, background:"transparent", border:"none",
                      cursor:"pointer", padding:"2px 6px"}}>
                    🗑
                  </button>
                </div>

                {/* スコア行 */}
                <div style={{
                  display:"grid", gridTemplateColumns:"repeat(5,1fr)",
                  padding:"10px 16px", gap:6, borderBottom:`1px solid ${C.border}`,
                  background:"#f8fafc",
                }}>
                  {[
                    { label:"株価",         val:`¥${entry.price.toLocaleString()}` },
                    { label:"RSI短/長",     val:`${entry.rsiS}/${entry.rsiL}` },
                    { label:"VIX",          val:entry.vix },
                    { label:"5指標",        val:`${entry.litCount}/5` },
                    { label:"スコア",       val:`${entry.totalScore > 0 ? "+" : ""}${entry.totalScore}` },
                  ].map(k => (
                    <div key={k.label} style={{textAlign:"center"}}>
                      <div style={{fontSize:9, color:C.muted, marginBottom:2}}>{k.label}</div>
                      <div style={{fontSize:12, fontWeight:700, color:C.text}}>{k.val}</div>
                    </div>
                  ))}
                </div>

                {/* メモ・結果 */}
                <div style={{padding:"12px 16px", display:"flex", flexDirection:"column", gap:8}}>
                  {entry.memo && (
                    <div style={{fontSize:12, color:C.text, lineHeight:1.7,
                      paddingLeft:10, borderLeft:`3px solid ${C.accent}`}}>
                      {entry.memo}
                    </div>
                  )}

                  {/* 結果記入エリア */}
                  {!isEditingOutcome ? (
                    <div style={{display:"flex", alignItems:"center", gap:8}}>
                      {entry.outcome ? (
                        <div style={{
                          flex:1, fontSize:12, color:C.bull, lineHeight:1.6,
                          padding:"6px 10px", borderRadius:6,
                          background:"#f0fdf4", border:`1px solid ${C.bull}44`,
                        }}>
                          📊 結果：{entry.outcome}
                        </div>
                      ) : (
                        <div style={{fontSize:11, color:C.muted, fontStyle:"italic"}}>
                          結果未記入（後日どうなったか記録しましょう）
                        </div>
                      )}
                      <button
                        onClick={() => { setEditOutcomeId(entry.id); setOutcomeText(entry.outcome); }}
                        style={{
                          padding:"4px 10px", fontSize:11, borderRadius:6,
                          background:"transparent", border:`1px solid ${C.border}`,
                          color:C.muted, cursor:"pointer", fontFamily:"inherit", flexShrink:0,
                        }}>
                        {entry.outcome ? "✏️ 編集" : "＋ 結果を記入"}
                      </button>
                    </div>
                  ) : (
                    <div style={{display:"flex", gap:8}}>
                      <input
                        value={outcomeText}
                        onChange={e => setOutcomeText(e.target.value)}
                        placeholder="例：翌日 ¥31,200 まで上昇。BUY判定は正解だった。"
                        style={{
                          flex:1, background:"#f8fafc",
                          border:`1.5px solid ${C.bull}`,
                          borderRadius:6, padding:"8px 10px",
                          fontSize:12, fontFamily:"inherit", outline:"none",
                        }}
                      />
                      <button onClick={() => saveOutcome(entry.id)}
                        style={{padding:"8px 14px", borderRadius:6,
                          background:C.bull, color:"#fff",
                          fontSize:12, fontWeight:700, border:"none",
                          cursor:"pointer", fontFamily:"inherit"}}>
                        保存
                      </button>
                      <button onClick={() => setEditOutcomeId(null)}
                        style={{padding:"8px 10px", borderRadius:6,
                          background:"transparent", color:C.muted,
                          border:`1px solid ${C.border}`,
                          fontSize:12, cursor:"pointer", fontFamily:"inherit"}}>
                        ✕
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

    </div>
  );
};

};

const NAV_TABS=[
  {id:"judge",     label:"⚡ 即判定"},
  {id:"journal",   label:"📒 日誌"},
  {id:"dashboard", label:"📊 チャート"},
  {id:"sector",    label:"🌐 セクター"},
  {id:"macro",     label:"🌍 マクロ"},
  {id:"risk",      label:"🚨 リスク"},
  {id:"trade",     label:"🎯 シナリオ"},

];

// ═══════════════════════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  // ── State ──
  const [activeNav,   setActiveNav]   = useState("judge");
  const [activeChart, setActiveChart] = useState("price");
  const [checks,      setChecks]      = useState({vix:false,pc:false,volume:false,wick:false,ma25:false});
  const [dataMode,    setDataMode]    = useState("mock");
  const [isLoading,   setIsLoading]  = useState(false);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [manualData,  setManualData]  = useState({});
  const [journalEntries, setJournalEntries] = useState([]);
  const [apiResults,  setApiResults]  = useState(
    Object.fromEntries(Object.keys(API_SYMBOLS).map(k=>[k,{status:"idle",latest:null}]))
  );

  // ── Price data ──
  const mockDataRef  = useRef(generateMockData());
  const sectorMockRef= useRef(generateSectorMock());
  const [priceData,  setPriceData]   = useState(mockDataRef.current);
  const [sectorData, setSectorData]  = useState(sectorMockRef.current);

  // ── Fetch live data ──
  const fetchLiveData = useCallback(async () => {
    setIsLoading(true);
    const newResults={...apiResults};
    // Mark all as loading
    Object.keys(API_SYMBOLS).forEach(k=>newResults[k]={status:"loading",latest:null});
    setApiResults({...newResults});

    // Fetch Kioxia (primary)
    try {
      const kioxiaData = await fetchStooqHistory(API_SYMBOLS.kioxia.stooq, 30);
      if(kioxiaData.length>0){
        setPriceData(kioxiaData);
        newResults.kioxia={status:"ok",latest:kioxiaData[kioxiaData.length-1].close};
        setDataMode("live");
      }
    } catch(e){
      newResults.kioxia={status:"error",latest:null};
    }

    // Fetch US stocks (Micron, SandDisk)
    for(const id of ["micron","sandisk"]){
      try{
        const d=await fetchStooqHistory(API_SYMBOLS[id].stooq,30);
        newResults[id]={status:"ok",latest:d[d.length-1]?.close||null};
      }catch(e){
        newResults[id]={status:"error",latest:null};
      }
    }

    // Samsung/SK Hynix (KRX, often CORS-blocked; mark attempt)
    ["samsung","skhynix"].forEach(id=>{ newResults[id]={status:"error",latest:null}; });

    setApiResults({...newResults});
    setLastUpdated(new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}));
    setIsLoading(false);

    // If Kioxia failed, stay on mock
    if(newResults.kioxia.status!=="ok"){
      setDataMode("mock");
    }
  }, []);

  // ── Apply manual data ──
  const applyManualData = useCallback((data) => {
    if(data.kioxiaPrice){
      const price=parseFloat(data.kioxiaPrice);
      if(!isNaN(price)){
        // Patch the last candle with manually entered price
        const patched=[...mockDataRef.current];
        patched[patched.length-1]={...patched[patched.length-1],close:price,high:Math.max(price,patched[patched.length-1].high),low:Math.min(price,patched[patched.length-1].low)};
        setPriceData(patched);
        setDataMode("manual");
        setLastUpdated(new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})+" (手動)");
      }
    }
  }, []);

  // ── Indicators ──
  const sma5   = calcSMA(priceData,5);
  const sma25  = calcSMA(priceData,25);
  const sma75  = calcSMA(priceData,75);
  const rsiArr     = calcRSI(priceData,9);   // 短期RSI（9期間）
  const rsiLongArr = calcRSI(priceData,26);  // 長期RSI（26期間）
  const bollArr= calcBoll(priceData);
  const macdArr= calcMACD(priceData);

  const chartData=priceData.map((d,i)=>({
    ...d,
    sma5:sma5[i], sma25:sma25[i], sma75:sma75[i],
    rsi:rsiArr[i], rsiLong:rsiLongArr[i],
    bbUpper:bollArr[i].upper,bbLower:bollArr[i].lower,
    macd:macdArr[i].macd,signal:macdArr[i].signal,hist:macdArr[i].hist,
  }));

  const last      = chartData[chartData.length-1];
  const prev      = chartData[chartData.length-2]||chartData[chartData.length-1];
  const change    = last.close - prev.close;
  const changePct = ((change/prev.close)*100).toFixed(2);
  const isUp      = change >= 0;

  const rsiSig  = last.rsi<30?"BUY":last.rsi>70?"SELL":"HOLD";
  const macdSig = last.macd>last.signal?"BUY":"SELL";
  const priceSig= last.close<20500?"BUY":last.close>25000?"SELL":"HOLD";
  const overall =
    [rsiSig,macdSig,priceSig].filter(s=>s==="BUY").length>=2?"BUY":
    [rsiSig,macdSig,priceSig].filter(s=>s==="SELL").length>=2?"SELL":"HOLD";

  const liveVix = manualData.vixLevel ? parseFloat(manualData.vixLevel) : null;
  const livePc  = manualData.pcRatio  ? parseFloat(manualData.pcRatio)  : null;

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'DM Mono','Courier New',monospace",color:C.text,paddingBottom:60}}>

      {/* HEADER */}
      <div style={{background:C.header,borderBottom:`1px solid #334155`,padding:"14px 24px",
        display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{background:C.accent,color:"#fff",fontWeight:900,fontSize:13,padding:"4px 10px",borderRadius:6,letterSpacing:1}}>285A</div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.headerText}}>KIOXIA Holdings</div>
            <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>
              <StatusPill status={dataMode} lastUpdated={lastUpdated} onRefresh={fetchLiveData} isLoading={isLoading}/>
            </div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:-1,color:isUp?"#34d399":"#f87171"}}>¥{last.close.toLocaleString()}</div>
          <div style={{fontSize:11,color:isUp?"#34d399":"#f87171"}}>{isUp?"▲":"▼"} ¥{Math.abs(change).toLocaleString()} ({isUp?"+":""}{changePct}%)</div>
        </div>
      </div>

      {/* NAV */}
      <div style={{display:"flex",background:C.header,borderBottom:"1px solid #334155",padding:"0 24px",overflowX:"auto"}}>
        {NAV_TABS.map(t=>(
          <button key={t.id} onClick={()=>setActiveNav(t.id)}
            style={{background:"transparent",border:"none",cursor:"pointer",
              color:activeNav===t.id?"#fbbf24":"#94a3b8",
              fontSize:12,padding:"12px 14px",
              borderBottom:`2px solid ${activeNav===t.id?"#fbbf24":"transparent"}`,
              fontFamily:"inherit",fontWeight:activeNav===t.id?700:400,transition:"all .15s",whiteSpace:"nowrap"}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:16}}>

        {/* ── 即判定エンジン ── */}
        {activeNav==="judge"&&(
          <JudgmentEngine onValuesChange={setManualData}/>
        )}

        {/* ── 📒 トレード日誌 ── */}
        {activeNav==="journal"&&(
          <JournalPanel
            journalEntries={journalEntries}
            setJournalEntries={setJournalEntries}
            currentVals={manualData}
            currentResult={(() => {
              const checks5 = {
                vixPeak:false, pcRatio:false, volumeStable:false,
                lowerWick:false, maDeviation:false,
              };
              return calcJudgment(
                { price: last.close, rsiS: last.rsi, rsiL: last.rsiLong,
                  macd: last.macd, macdSig: last.signal, vix: 19.23,
                  ...manualData },
                checks5
              );
            })()}
          />
        )}

        {/* ── DASHBOARD ── */}
        {activeNav==="dashboard"&&(
          <>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
              {[
                {label:"取得単価",       val:"¥22,721",  sub:"300株保有",  color:C.text},
                {label:"含み損益",       val:`+¥${((last.close-22721)*300).toLocaleString()}`,sub:`+${(((last.close-22721)/22721)*100).toFixed(1)}%`,color:C.bull},
                {label:"RSI (短期)",    val:last.rsi,   sub:last.rsi>80?"⚠️ 過熱域":last.rsi>70?"買われ過ぎ":"中立",color:last.rsi>80?C.bear:last.rsi>70?C.warn:C.text},
                {label:"利確目安",       val:"¥32,000〜", sub:"段階的に100株ずつ", color:C.cyan},
              ].map(k=>(
                <Card key={k.label} style={{padding:"12px 16px"}}>
                  <STitle>{k.label}</STitle>
                  <div style={{fontSize:18,fontWeight:800,color:k.color}}>{k.val}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>{k.sub}</div>
                </Card>
              ))}
            </div>

            <Card style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
              <div><STitle>総合シグナル判定</STitle><SignalBadge signal={overall}/></div>
              <div style={{display:"flex",gap:16}}>
                {[{l:"RSI",s:rsiSig},{l:"MACD",s:macdSig},{l:"価格帯",s:priceSig}].map(x=>(
                  <div key={x.l} style={{textAlign:"center"}}>
                    <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{x.l}</div>
                    <SignalBadge signal={x.s} small/>
                  </div>
                ))}
              </div>
            </Card>

            {/* ═══ 3段チャート（価格・RSI・MACD 同時表示） ═══ */}
            {isLoading ? <Card><Spinner/></Card> : (
              <Card style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:0}}>

                {/* ── 凡例ヘッダー ── */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
                  <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
                    {[
                      {color:"#9333ea",label:`MA5  ¥${(last.sma5||calcSMA(priceData,5)[priceData.length-1]||0).toLocaleString()}`},
                      {color:C.bull,   label:`MA25 ¥${(last.sma25||0).toLocaleString()}`},
                      {color:C.blue,   label:`MA75 ¥${(last.sma75||0).toLocaleString()}`},
                    ].map(l=>(
                      <div key={l.label} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
                        <div style={{width:16,height:2,background:l.color,borderRadius:1}}/>
                        <span style={{color:l.color,fontWeight:700}}>{l.label}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:10,color:C.muted}}>日足 / 直近{chartData.length}営業日</div>
                </div>

                {/* ── 第1段：価格チャート + MA3本 ── */}
                <div style={{borderBottom:`1px solid ${C.border}`,paddingBottom:4,marginBottom:4}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:2,letterSpacing:.8}}>📈 株価 ／ MA5・MA25・MA75</div>
                  <ResponsiveContainer width="100%" height={260}>
                    <AreaChart data={chartData} margin={{top:4,right:46,left:4,bottom:0}}>
                      <defs>
                        <linearGradient id="pg2" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%"  stopColor={C.accent} stopOpacity={.15}/>
                          <stop offset="95%" stopColor={C.accent} stopOpacity={0}/>
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.border} vertical={false}/>
                      <XAxis dataKey="date" tick={{fontSize:9,fill:C.muted}} interval={4} axisLine={false} tickLine={false}/>
                      <YAxis
                        domain={["auto","auto"]}
                        tick={{fontSize:9,fill:C.muted}}
                        tickFormatter={v=>`¥${(v/1000).toFixed(0)}k`}
                        width={46} orientation="right"
                        axisLine={false} tickLine={false}
                      />
                      <Tooltip content={<PriceTooltip/>}/>
                      {/* 取得単価ライン */}
                      <ReferenceLine y={22721} stroke={C.purple} strokeDasharray="4 3" strokeWidth={1}
                        label={{value:"取得単価¥22,721",fontSize:8,fill:C.purple,position:"insideTopLeft"}}/>
                      {/* MA5 */}
                      <Line type="monotone" dataKey="sma5"  stroke="#9333ea" strokeWidth={1.5} dot={false} name="MA5"  connectNulls/>
                      {/* MA25 */}
                      <Line type="monotone" dataKey="sma25" stroke={C.bull}   strokeWidth={1.5} dot={false} name="MA25" connectNulls/>
                      {/* MA75 */}
                      <Line type="monotone" dataKey="sma75" stroke={C.blue}   strokeWidth={1.5} dot={false} name="MA75" connectNulls/>
                      {/* 株価エリア */}
                      <Area type="monotone" dataKey="close" stroke={C.accent} strokeWidth={2}
                        fill="url(#pg2)" dot={false} name="終値"/>
                    </AreaChart>
                  </ResponsiveContainer>
                </div>

                {/* ── 第2段：RSI 短期 + 長期 ── */}
                <div style={{borderBottom:`1px solid ${C.border}`,paddingBottom:4,marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:2}}>
                    <div style={{fontSize:10,color:C.muted,letterSpacing:.8}}>📊 RSI</div>
                    <div style={{display:"flex",gap:10}}>
                      <span style={{fontSize:11,color:"#9333ea",fontWeight:700}}>
                        短期 {last.rsi ?? "—"}
                        {last.rsi>80?" ⚠️":last.rsi>70?" 過熱":""}
                      </span>
                      <span style={{fontSize:11,color:C.bull,fontWeight:700}}>
                        長期 {last.rsiLong ?? "—"}
                      </span>
                    </div>
                  </div>
                  <ResponsiveContainer width="100%" height={130}>
                    <LineChart data={chartData} margin={{top:4,right:46,left:4,bottom:0}}>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.border} vertical={false}/>
                      <XAxis dataKey="date" tick={{fontSize:9,fill:C.muted}} interval={4} axisLine={false} tickLine={false}/>
                      <YAxis domain={[0,100]} tick={{fontSize:9,fill:C.muted}} width={46} orientation="right" axisLine={false} tickLine={false}/>
                      <Tooltip contentStyle={{background:"#ffffff",border:`1px solid ${C.border}`,borderRadius:6,fontSize:11,color:C.text}}/>
                      {/* 過熱ライン */}
                      <ReferenceLine y={80} stroke={C.bear}   strokeDasharray="3 3" label={{value:"80",fontSize:8,fill:C.bear,position:"right"}}/>
                      <ReferenceLine y={70} stroke="#f97316"  strokeDasharray="3 3" label={{value:"70",fontSize:8,fill:"#f97316",position:"right"}}/>
                      <ReferenceLine y={50} stroke={C.border} strokeDasharray="2 4"/>
                      <ReferenceLine y={30} stroke={C.bull}   strokeDasharray="3 3" label={{value:"30",fontSize:8,fill:C.bull,position:"right"}}/>
                      {/* RSI短期（6期間） */}
                      <Line type="monotone" dataKey="rsi"     stroke="#9333ea" strokeWidth={2}   dot={false} name="RSI短期" connectNulls/>
                      {/* RSI長期（14期間） */}
                      <Line type="monotone" dataKey="rsiLong" stroke={C.bull}   strokeWidth={1.5} dot={false} name="RSI長期" connectNulls/>
                    </LineChart>
                  </ResponsiveContainer>
                </div>

                {/* ── 第3段：MACD ライン + シグナル + ヒストグラム ── */}
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:2}}>
                    <div style={{fontSize:10,color:C.muted,letterSpacing:.8}}>📉 MACD</div>
                    <div style={{display:"flex",gap:10}}>
                      <span style={{fontSize:11,color:"#9333ea",fontWeight:700}}>
                        MACD {last.macd?.toLocaleString() ?? "—"}
                      </span>
                      <span style={{fontSize:11,color:C.bull,fontWeight:700}}>
                        シグナル {last.signal?.toLocaleString() ?? "—"}
                      </span>
                      <span style={{fontSize:11,color:last.hist>=0?C.bull:C.bear,fontWeight:700}}>
                        ヒスト {last.hist>=0?"+":""}{last.hist?.toLocaleString() ?? "—"}
                      </span>
                    </div>
                  </div>
                  <ResponsiveContainer width="100%" height={120}>
                    <BarChart data={chartData} margin={{top:4,right:46,left:4,bottom:0}}>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.border} vertical={false}/>
                      <XAxis dataKey="date" tick={{fontSize:9,fill:C.muted}} interval={4} axisLine={false} tickLine={false}/>
                      <YAxis tick={{fontSize:9,fill:C.muted}} width={46} orientation="right" axisLine={false} tickLine={false}/>
                      <Tooltip contentStyle={{background:"#ffffff",border:`1px solid ${C.border}`,borderRadius:6,fontSize:11,color:C.text}}/>
                      <ReferenceLine y={0} stroke={C.muted} strokeWidth={1}/>
                      {/* ヒストグラム */}
                      <Bar dataKey="hist" name="ヒスト" isAnimationActive={false}
                        fill={C.bull}
                        label={false}
                      />
                      {/* MACDライン（短期） */}
                      <Line type="monotone" dataKey="macd"   stroke="#9333ea" strokeWidth={2}   dot={false} name="MACD"/>
                      {/* シグナルライン（長期） */}
                      <Line type="monotone" dataKey="signal" stroke={C.bull}   strokeWidth={1.5} dot={false} name="シグナル"/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>

              </Card>
            )}

            <ChecklistPanel checks={checks} setChecks={setChecks}/>
          </>
        )}

        {activeNav==="sector"&&(
          <>
            <SectorTable sectorData={sectorData}/>
            <SectorTrendChart sectorData={sectorData}/>
          </>
        )}

        {activeNav==="macro"&&<MacroScorePanel liveVix={liveVix} livePc={livePc}/>}
        {activeNav==="risk"&&<RiskDashboard currentPrice={last.close}/>}
        {activeNav==="trade"&&<TradeDecisionPanel last={last} overallSignal={overall} macroScore={MACRO_OVERALL}/> }

        {/* ── API設定タブ (Phase 4) ── */}
        {activeNav==="api"&&(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {/* Mode selector */}
            <Card>
              <STitle>🔌 データ取得モード選択</STitle>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
                {[
                  {id:"live",   icon:"📡", label:"LIVE取得",   desc:"stooq.comから自動取得（要ネット接続）"},
                  {id:"manual", icon:"✏️", label:"手動入力",   desc:"自分で価格を入力してリアル運用"},
                  {id:"mock",   icon:"🎲", label:"モックデータ",desc:"テスト用のシミュレーションデータ"},
                ].map(m=>(
                  <div key={m.id} onClick={()=>{setDataMode(m.id);if(m.id==="live")fetchLiveData();if(m.id==="mock")setPriceData(mockDataRef.current);}}
                    style={{padding:"14px",borderRadius:10,cursor:"pointer",textAlign:"center",
                      background:dataMode===m.id?"#fef3c7":"#f8fafc",
                      border:`2px solid ${dataMode===m.id?C.accent:C.border}`,transition:"all .2s"}}>
                    <div style={{fontSize:28,marginBottom:6}}>{m.icon}</div>
                    <div style={{fontSize:13,fontWeight:700,color:dataMode===m.id?C.accent:C.text,marginBottom:4}}>{m.label}</div>
                    <div style={{fontSize:11,color:C.muted,lineHeight:1.5}}>{m.desc}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"center"}}>
                <StatusPill status={dataMode} lastUpdated={lastUpdated} onRefresh={fetchLiveData} isLoading={isLoading}/>
              </div>
            </Card>

            {/* Manual input */}
            <ManualInputPanel manualData={manualData} setManualData={setManualData} onApply={applyManualData}/>

            {/* API status */}
            <ApiStatusPanel apiResults={apiResults}/>

            {/* Data source guide */}
            <Card>
              <STitle>📖 データソース ガイド</STitle>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {[
                  {label:"Kioxia (285A)",     src:"stooq.com",    detail:"東証EODデータ。翌営業日15:30以降に前日分が更新されます。",         status:"対応"},
                  {label:"Micron (MU)",        src:"stooq.com",    detail:"NASDAQ EODデータ。米国市場終了後（日本時間翌朝）に更新。",         status:"対応"},
                  {label:"SandDisk (WDC)",     src:"stooq.com",    detail:"NASDAQ EODデータ。同上。",                                          status:"対応"},
                  {label:"SK Hynix (000660)",  src:"stooq.com",    detail:"KRX（韓国）はCORS制限でブラウザから直接取得が難しい場合あり。",    status:"手動推奨"},
                  {label:"Samsung (005930)",   src:"stooq.com",    detail:"同上。手動入力モードで対応してください。",                          status:"手動推奨"},
                  {label:"VIX / P/C比率",      src:"手動入力",     detail:"CBOE公式サイト (cboe.com) で確認して手動入力してください。",         status:"手動のみ"},
                ].map(d=>(
                  <div key={d.label} style={{display:"flex",gap:12,padding:"10px 12px",borderRadius:8,background:"#f1f5f9",border:`1px solid ${C.border}`}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:C.text}}>{d.label}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2,lineHeight:1.5}}>{d.detail}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,flexShrink:0}}>
                      <span style={{fontSize:10,color:C.muted}}>{d.src}</span>
                      <span style={{fontSize:11,fontWeight:700,color:d.status==="対応"?C.bull:d.status==="手動推奨"?C.warn:C.muted}}>{d.status}</span>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

        <div style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:4}}>
          {dataMode==="live"?"✅ リアルデータ表示中":dataMode==="manual"?"✏️ 手動入力データ表示中":"🎲 モックデータ表示中（API設定タブでLIVEモードへ切替可）"}
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
